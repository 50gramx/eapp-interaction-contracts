name: Compile Mesh Contracts to Protobuf

on:
  push:
    branches: [ main ]
    paths:
      - 'src/main/contracts/**/ethosapp_mesh_variables.yaml'
      - 'src/main/contracts/**/ethosapp_mesh_capabilities.yaml'
      - 'src/main/contracts/**/ethosapps.yaml'
      - 'src/main/contracts/**/ethosapp_local_variables.yaml'
      - 'src/main/contracts/**/ethosapp_local_capabilities.yaml'
      - 'src/main/contracts/**/ethosapp.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Interaction Contracts (Source YAMLs)
        uses: actions/checkout@v4

      - name: Checkout System Contracts (Target Repo for Protos)
        uses: actions/checkout@v4
        with:
          repository: 50gramx/eapp-system-contracts
          token: ${{ secrets.PROTOBUF_TOKEN || github.token }}
          path: .ci/eapp-system-contracts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install yaml

      - name: Compile YAML Mesh Contracts to Proto
        run: |
          export GO_DOMAIN_MODULE_PREFIX=github.com/50gramx/eapp-golang-domain
          node tools/compile-yaml-to-proto.mjs \
            --contracts-root . \
            --system-contracts-root .ci/eapp-system-contracts

      - name: Commit and Push generated .proto files
        run: |
          cd .ci/eapp-system-contracts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/proto
          if git diff --cached --quiet; then
            echo "ℹ  No Protobuf contract changes detected."
          else
            git commit -m "chore: auto-compile yaml mesh contracts to proto [skip ci]"
            git push origin master
            echo "✓ Proto files pushed to eapp-system-contracts/master"
          fi

      - name: Trigger System Contracts Distribution
        env:
          GH_TOKEN: ${{ secrets.PROTOBUF_TOKEN || github.token }}
        run: |
          echo "→ Triggering protobuf-sync workflow to regenerate manifest and consumers..."
          gh api repos/50gramx/eapp-system-contracts/dispatches \
            -f event_type=protobuf-sync \
            -f client_payload[source]=eapp-interaction-contracts \
            -f client_payload[ref]=main
          echo "✓ Dispatch sent. Manifest will be regenerated from proto files."

  derive-features:
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROTOBUF_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install yaml

      - name: Derive BDD feature files from contracts
        run: node tools/derive-features.mjs

      - name: Commit derived feature files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'src/main/contracts/**/features/*.feature' \
                  'src/main/contracts/**/features/*.mapping.json'
          if git diff --cached --quiet; then
            echo "ℹ  No feature file changes detected."
          else
            git commit -m "chore: auto-derive bdd feature files from contracts [skip ci]"
            git push origin main
            echo "✓ Derived feature files committed."
          fi
