# Mesh Capability: maps to gRPC service ProfileService.GetProfile.
# Triggers mesh-invoke command under-the-hood.
- name-code: EALC8001
  name: Fetch Mesh Profile
  mesh:
    service: ethos.elint.services.product.identity.ProfileService
    method: GetProfile
    expects: EAIV8002
    returns: EAIV8001
