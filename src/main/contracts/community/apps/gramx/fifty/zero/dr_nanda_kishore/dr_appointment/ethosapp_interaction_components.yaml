    level: 2

- name-code: EAIC9008
  name: About Para 1
  component:
    name-code: EIC1020
    text: "Dr. Nanda Kishore is a urologist focused on kidney stone disease, prostate disorders and complex urological conditions, with advanced training in laparoscopic, endourological and reconstructive techniques."
    style: body

- name-code: EAIC9009
  name: About Para 2
  component:
    name-code: EIC1020
    text: "His practice emphasises precise diagnosis, minimally invasive treatment and clear, unhurried patient communication — the goal is less pain, shorter hospital stays and a faster return to normal life."
    style: body

