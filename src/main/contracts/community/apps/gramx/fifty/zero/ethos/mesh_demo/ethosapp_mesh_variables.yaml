# Mesh Profile entity - auto-provisions local SQLite DB and log table.
- name-code: EAMV8001
  name: Mesh Profile
  type: ELVT1021
  db: true
  log: true
  properties:
    - name-code: EAMVT8001
      name: user_id
      type: ELVT1007
    - name-code: EAMVT8002
      name: display_name
      type: ELVT1007
    - name-code: EAMVT8003
      name: email
      type: ELVT1007
  default:
    value:
      user_id: "usr-456"
      display_name: "Mock Mesh User"
      email: "mock@mesh.net"

# Input filter structure for capability invocation
- name-code: EAMV8002
