# Return the TextEditingController for the username input field.
- name-code: EALC7001
  name: Get Username Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV7002

# Extract index 0 from the live status list into the snapshot map.
- name-code: EALC7003
  name: Sync Snapshot
  context:
    steps:
      - command: list-get
        source: EAIV7001
        index: 0
        assign-to: EAIV7003

# Create a new guest identity.
# Dart generates UUID, persists to SharedPreferences, emits updated stream.
- name-code: EALC7004
  name: Create Guest Account
  context:
    steps:
      - command: platform-invoke
        handler: identity.createGuest

# Activate the guest account.
# Passes the username controller directly.
- name-code: EALC7005
  name: Activate Account
  context:
    steps:
      - command: platform-invoke
        handler: identity.activate
        params:
          username: EAIV7002

# Reset identity — dev/testing utility.
- name-code: EALC7006
  name: Reset Identity
  context:
    steps:
      - command: platform-invoke
        handler: identity.reset
