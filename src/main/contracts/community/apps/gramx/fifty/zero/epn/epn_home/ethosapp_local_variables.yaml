# Live deployment list — polls epnd via gRPC every 5 s and pushes updates.
- name-code: EAIV5001
  name: Deployments
  type: ELVT1020
  default:
    platform-stream: epn.deployments.list

# Node identity — {did, peer_id, addrs, online}.
- name-code: EAIV5004
  name: Node Identity
  type: ELVT1020
  default: {}

# Wallet info — {balance_uetc, balance_etc, updated_at}.
- name-code: EAIV5005
  name: Wallet Info
  type: ELVT1020
  default: {}

# Result of the last node start/stop action — {state, pid} or {error}.
- name-code: EAIV5006
  name: Node Action Result
  type: ELVT1020
  default: {}

# Live node lifecycle state — streamed from the host every second. Running
# responses also include {uptime_seconds, uptime_display, peer_count,
# running_summary}.
# state ∈ notRunning | starting | running | degraded | externallyManaged | failed.
- name-code: EAIV5007
  name: Node State
  type: ELVT1020
  default:
    platform-stream: epn.node.status

# Device-health capacity plan from `epnd plan` — {host_cores, free_ram_gib,
# free_disk_gib, recommended, pressure, reasons[], decision_needed, foreign_running}.
- name-code: EAIV5008
  name: Capacity Plan
  type: ELVT1020
  default: {}

# Identity & Trust flow state (EAIV5009-5015) relocated to epn_settings
# entirely (EAIV12022-12029) — Home shouldn't have hosted this section.
