    text: EAIV14001.did
    variant: caption
    color: on-surface-subtle

- name-code: EAIC14004
  name: PeerID Label
  component:
    name-code: EIC1020
    text: EAIV14001.peer_id
    variant: caption
    color: on-surface-subtle

# Shown when the node is reachable but p2p is down — explains why.
- name-code: EAIC14005
  name: Offline Reason Label
  component:
    name-code: EIC1020
    text: EAIV14001.offline_reason
    variant: caption
    color: caution

# Shown when a start we attempted never became healthy.
- name-code: EAIC14006
  name: Failure Label
  component:
    name-code: EIC1020
    text: EAIV14001.failure
    variant: caption
    color: negative

