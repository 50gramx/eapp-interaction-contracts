# ══════════════════════════════════════════════════════════════════════════════
# Nodes on this device — list, add, stop/remove, and device clean (level surface)
# ══════════════════════════════════════════════════════════════════════════════

- name-code: EAIC14100
  name: Manage Header
  component:
    name-code: EIC1004
    label: Nodes on this device

- name-code: EAIC14101
  name: Manage Note
  component:
    name-code: EIC1020
    text: Every node here is yours. Add more, stop what you started, or remove one entirely — nothing runs or leaves this machine without your say.
    variant: body2
    color: on-surface-muted

# Live list of all nodes — tap a row to select it for stop/remove.
- name-code: EAIC14102
  name: Nodes List
  component:
    name-code: EIC1026
    source: EAIV14020
    item-type: list-item
    title-field: label
    subtitle-field: detail
    trailing-text-field: state
    on-item-tap: EALC14025
    scrollable: true
    max-height: 220

- name-code: EAIC14103
  name: Nodes Divider
  component:
    name-code: EIC1025
    height: 1

