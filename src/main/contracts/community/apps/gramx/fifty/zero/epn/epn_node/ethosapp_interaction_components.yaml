    name-code: EIC1020
    text: Lite — join instantly
    variant: headline6

- name-code: EAIC14201
  name: Lite Mode Desc
  component:
    name-code: EIC1020
    text: Identity, wallet and on-device AI on the mesh. No Linux VM, ready in seconds. You can lend resources later by upgrading to compute.
