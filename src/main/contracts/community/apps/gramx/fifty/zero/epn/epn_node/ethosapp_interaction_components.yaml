  component:
    name-code: EIC1020
    text: Your node is off
    variant: headline6

- name-code: EAIC14071
  name: Off Body
  component:
    name-code: EIC1020
    text: Nothing runs or leaves this machine until you start it — that act is yours alone. Choose how this node should join the mesh.
    variant: body2
    color: on-surface-muted

# Mode A — Lite (recommended default)
- name-code: EAIC14200
  name: Lite Mode Title
