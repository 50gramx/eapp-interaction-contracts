# Metering summary — computed: {earned_uetc, spent_uetc, open_channels, running_operators,
# resource_summary, meter_rows, sessions, ...}. EAIV11005.sessions is one row per
# (session_id, resource_type) — daemon /v1/metering's SessionRow, merging signed
# receipts, live K8sResourceMeter state, and the statement publish log.
- name-code: EAIV11005
  name: Metering Summary
  type: ELVT1020
  default: {}

# ── Selected Session detail (drill-down) ────────────────────────────────────
# Tapping a row in the Sessions list (EAIC11141, EIC1026 — EIC1032 tables have
# no on-row-tap, see epn_circle's Roster List for the same documented
# constraint) copies every field of that session into these page-level
# variables via EALC11003, so the detail card below can show the full
# per-operator/deployment/pod/session/resource record: what it cost, whether
# it is still running, and whether its signed statement actually reached the
