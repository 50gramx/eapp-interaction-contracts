# Wallet balance and summary — {balance_uetc, balance_etc, updated_at}.
- name-code: EAIV11001
  name: Wallet Info
  type: ELVT1020
  default: {}

# Payment channels — [{id, peer_a_did, peer_b_did, balance_a_utc, balance_b_utc, status}].
- name-code: EAIV11002
  name: Channels
  type: ELVT1020
  default: []

# Active deployments — [{id, name, status, operator_id}].
- name-code: EAIV11003
  name: Deployments
  type: ELVT1020
  default: []

# Node resource summary across all 7 EP&N resource networks — populated from
# NodeService.Resources: {gpu_class, vram_gib, gpu_tflops, ram_gib, ram_pool_gib,
# ram_bw_class, vcpu, vcpu_seconds, cpu_arch, simd, storage_gib, storage_block_gib,
# storage_object_gib, storage_archival_gib, redundancy, egress_gbps, relay_slots,
# energy_kwh_rate, energy_source}.
- name-code: EAIV11004
  name: Resources
  type: ELVT1020
  default: {}

# Metering summary — computed: {earned_uetc, spent_uetc, open_channels, running_operators,
# resource_summary, meter_rows, sessions, ...}. EAIV11005.sessions is one row per
# (session_id, resource_type) — daemon /v1/metering's SessionRow, merging signed
# receipts, live K8sResourceMeter state, and the statement publish log.
- name-code: EAIV11005
  name: Metering Summary
  type: ELVT1020
  default: {}

# ── Selected Session detail (drill-down) ────────────────────────────────────
# Tapping a row in the Sessions list (EAIC11141, EIC1026 — EIC1032 tables have
# no on-row-tap, see epn_circle's Roster List for the same documented
# constraint) copies every field of that (grouped) session into these
# page-level variables via EALC11003, so the detail card below can show the
# full record: who got metered (operator/deployment/pod), the per-resource
# breakdown (Resources — one line per resource network, since the session
# row itself is grouped across resources), and whether its signed statement
# actually reached the gramx.

- name-code: EAIV11010
  name: Selected Session ID
  type: ELVT1007
  default: ""

- name-code: EAIV11011
  name: Selected Session Operator
  type: ELVT1007
  default: ""

- name-code: EAIV11012
  name: Selected Session Deployment
  type: ELVT1007
  default: ""

- name-code: EAIV11013
  name: Selected Session Pod
  type: ELVT1007
  default: ""

- name-code: EAIV11014
  name: Selected Session Receipts
  type: ELVT1006
  default: 0

- name-code: EAIV11015
  name: Selected Session Amount UETC
  type: ELVT1006
  default: 0

# Human-readable ("Today · 1:26 PM" / "since Today · 1:26 PM — ongoing" for a
# still-running session), not a raw UTC ISO timestamp.
- name-code: EAIV11016
  name: Selected Session When
  type: ELVT1007
  default: ""

- name-code: EAIV11017
  name: Selected Session Status
  type: ELVT1007
  default: ""

# One line per resource network this session touched — "GB-hour: 0.0036
# GiB-hours · 1232 receipts · 0 μETC", etc. The per-resource-type accounting
# granularity foundation asked for lives here, inside the grouped row.
- name-code: EAIV11018
  name: Selected Session Resources
  type: ELVT1007
  default: ""

- name-code: EAIV11019
  name: Selected Session Publish Status
  type: ELVT1007
  default: ""

- name-code: EAIV11020
  name: Selected Session Replica Peers
  type: ELVT1007
  default: ""

# Matches an explicit "selected"/"none" enum, not the raw session id — EIC1036
# needs fixed case values (same reasoning as epn_circle's Selection State).
- name-code: EAIV11021
  name: Selected Session State
  type: ELVT1007
  default: "none"
