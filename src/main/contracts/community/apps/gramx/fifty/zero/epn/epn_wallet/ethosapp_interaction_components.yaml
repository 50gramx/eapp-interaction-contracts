# ── Balance section ───────────────────────────────────────────────────────────

- name-code: EAIC8001
  name: Balance Header
  component:
    name-code: EIC1004
    label: EthosCoin Balance

- name-code: EAIC8002
  name: Balance Metric
  component:
    name-code: EIC1031
    value: EAIV8001.balance_etc
