    caption: ETC
    status: primary

- name-code: EAIC8004
  name: Balance MicroETC Label
  component:
    name-code: EIC1020
    text: EAIV8001.balance_uetc
    variant: caption
    align: center
    color: on-surface-subtle

- name-code: EAIC8005
  name: Refresh Balance Button
  component:
    name-code: EIC1008
    label: Refresh
    on-click: EALC8001

# ── Channels section ──────────────────────────────────────────────────────────

- name-code: EAIC8006
  name: Channels Header
  component:
    name-code: EIC1004
    label: Payment Channels

- name-code: EAIC8007
  name: Channels Table
  component:
    name-code: EIC1032
    source: EAIV8002
    columns:
      - Channel
      - Peer
      - Status
    fields:
      - id
      - peer_b_did
      - status
    empty-message: No open channels. Open one below to pay a peer.

