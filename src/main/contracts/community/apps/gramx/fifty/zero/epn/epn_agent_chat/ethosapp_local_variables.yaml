# Two-way bound composer input text — synced automatically with the EIC1009
# text field via text-bind. EALC6002 reads this directly (no controller needed).
- name-code: EAIV6005
  name: Composer Text
  type: ELVT1007
  default: ""

# Fixed persona id -- always Evo (the concierge). Kept as a variable (rather
# than inlined in EALC6002) so the outgoing request is still composed
# entirely from UI/session state before the mesh invoke happens. There is no
# picker anymore; per the EP&N agent boundary model the user only ever talks
# to Evo, which consults specialists internally.
- name-code: EAIV6014
  name: Active Persona Id
  type: ELVT1007
  default: "epn.concierge.v1"

# View mode for the main content match (EAIC6047) and the footer match
# (EAIC6046): "chat" (default) shows the transcript + normal composer;
# "workflows" shows the workflows panel + a "Back to chat" footer instead.
# Set by EALC6024 (Workflows button) / EALC6025 (Back to chat).
- name-code: EAIV6046
  name: View Mode
  type: ELVT1007
  default: "chat"

# Local working copy of the outgoing request. The UI and local capability
# keep this entity-shaped payload in memory while the user types, so the
# mesh request is composed from local state instead of being built directly
# by the UI button.
- name-code: EAIV6003
  name: Send Request
  type: ELVT1021
  modelled: true
  default: {}
  properties:
    - name-code: EAMVT6001
      name: persona_id
      type: ELVT1007
      default: ""
    - name-code: EAMVT6002
      name: conversation_id
      type: ELVT1007
      default: ""
    - name-code: EAMVT6003
      name: text
      type: ELVT1007
      default: ""

# Growing list of chat messages. Updated by EALC6002 (send) via assign-to.
#
# Human turns stay the plain {role, text} shape ("You" messages, daemon-
# offline / send-error rows).
#
# AI turns (Evo or a directly-chatted specialist) carry the evolved Aha 3
# shape built by eapp-live's ChatTurnAccumulator from the agentStream
# events of that turn:
#   {role, text, ai: true, persona_id, locality, grounding, activity,
#    evidence, errors}
# where activity is [{type, label, tool, status}], evidence is
# [{agent, capability, grounded}], grounding is 'grounded' |
# 'general_guidance', locality is always 'local' (Aha 1: no cloud
# escalation). EIC1026's chat-message renderer reads these fields directly
# off each item with no extra contract properties -- see
# eapp-jittery-modelled's _CarbonChatBubble (AI label, locality/grounding
# tags, activity summary, "Why this answer?" explainability disclosure).
- name-code: EAIV6002
  name: Messages
  type: ELVT1018
  default: []

# Latest durable run status snapshot, refreshed on page open from the
# read-only run-store bridge. Used only for a compact visibility line.
- name-code: EAIV6016
  name: Latest Run
  type: ELVT1019
  modelled: true
  default: {}
  properties:
    - name-code: EAIVT6016
      name: conversation_id
      type: ELVT1007
      default: ""
    - name-code: EAIVT6017
      name: id
      type: ELVT1007
      default: ""
    - name-code: EAIVT6018
      name: status
      type: ELVT1007
      default: ""

# Latest approval status snapshot, refreshed on page open from the
# read-only approval-store bridge. Used only for a compact visibility line.
- name-code: EAIV6017
  name: Latest Approval
  type: ELVT1019
  modelled: true
  default: {}
  properties:
    - name-code: EAIVT6019
      name: id
      type: ELVT1007
      default: ""
    - name-code: EAIVT6020
      name: status
      type: ELVT1007
      default: ""

# Live readiness progress feed, subscribed only while "Run ready checks" is
# active. Emits the truthful timeline of real execution events.
- name-code: EAIV6018
  name: Readiness Progress
  type: ELVT1018
  default: []

# Active conversation ID tracked across messages in the current session.
# Generated by daemon on first message, reused for subsequent messages.
- name-code: EAIV6019
  name: Active Conversation ID
  type: ELVT1007
  default: ""

# User turn map built by EALC6002 before mesh-invoke and appended to EAIV6002.
# Keys match the EIC1026 field codes so the same renderer handles both turns.
- name-code: EAIV6028
  name: User Message
  type: ELVT1021
  default: {}

# Mesh response from EAMC6002 (used by EALC6002).
# Single pre-composed message from daemon (now unary, not array).
- name-code: EAIV6027
  name: Mesh Response Message
  type: ELVT1021
  modelled: true
  default: {}
  properties:
    - name-code: EAMVT6004
      name: role
      type: ELVT1007
      default: ""
    - name-code: EAMVT6008
      name: text
      type: ELVT1007
      default: ""
    - name-code: EAMVT6009
      name: ai
      type: ELVT1015
      default: false
    - name-code: EAMVT6010
      name: persona_id
      type: ELVT1007
      default: ""
    - name-code: EAMVT6011
      name: locality
      type: ELVT1007
      default: ""
    - name-code: EAMVT6012
      name: grounding
      type: ELVT1007
      default: ""
    - name-code: EAMVT6013
      name: activity
      type: ELVT1018
      default: []
    - name-code: EAMVT6014
      name: evidence
      type: ELVT1018
      default: []
    - name-code: EAMVT6015
      name: errors
      type: ELVT1018
      default: []
    - name-code: EAMVT6016
      name: conversation_id
      type: ELVT1007
      default: ""
    # Tile/card variation (Aha 5) — mirrors EAMV6002.
    - name-code: EAMVT6017
      name: kind
      type: ELVT1007
      default: "message"
    - name-code: EAMVT6018
      name: approval_id
      type: ELVT1007
      default: ""
    - name-code: EAMVT6019
      name: risk
      type: ELVT1007
      default: ""
    - name-code: EAMVT6020
      name: cost
      type: ELVT1007
      default: ""
    - name-code: EAMVT6021
      name: target
      type: ELVT1007
      default: ""

# Transient "pending turn" list driving the animated thinking indicator
# (EAIC6040). EALC6002 appends a thinking item here right before the unary
# mesh invoke and clears it the moment the response arrives, so the typing
# animation shows only while Evo is actually working. Kept separate from
# EAIV6002 so the committed chat history is never polluted by a placeholder.
- name-code: EAIV6029
  name: Pending Turn
  type: ELVT1018
  default: []

# The single thinking item appended to EAIV6029. `thinking: true` is the only
# signal the chat-message renderer needs to draw the animated dots bubble.
- name-code: EAIV6030
  name: Thinking Item
  type: ELVT1021
  default: {}

# Workflows / jobs board: every durable run with its state (Ongoing / Awaiting
# approval / Completed / Failed / Cancelled / Pending), newest first. Populated
# on page open and after approve/deny by epn.agent.run.list. Each item is
# {id, title, status, state_label, steps, updated_at}.
- name-code: EAIV6031
  name: Workflows
  type: ELVT1018
  default: []
