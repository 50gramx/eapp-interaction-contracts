# Live identity state — auto-subscribes to platform stream, UI rebuilds on change.
# Emits: [{isGuest, isActivated, hasAccount, accountId, username, statusLabel, statusSublabel}]
- name-code: EAIV7001
  name: Identity Status
  type: ELVT1020
  default:
    platform-stream: identity.status

# TextEditingController for the username/activation-code input field.
# Must be ELVT1001 so EIC1009 can wire text-controller to it.
- name-code: EAIV7002
  name: Username Controller
  type: ELVT1001
  default: {}

# Single identity snapshot extracted from the stream list (index 0).
- name-code: EAIV7003
  name: Identity Snapshot
  type: ELVT1019
  default: {}
