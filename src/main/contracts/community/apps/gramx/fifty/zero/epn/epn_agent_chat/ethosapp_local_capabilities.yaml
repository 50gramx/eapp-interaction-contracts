# Called via on-appear when the chat page opens. Discovers specialist
# personas live from the daemon (epn.agent.personas) instead of the
# hardcoded Evo/Sigma/Lume picker -- see EAIV6015.
# Also auto-selects the first persona as default.
- name-code: EALC6015
  name: Init Personas
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.personas
        assign-to: EAIV6015
      # Auto-select first persona if any are available
      - command: list-get
        target: EAIV6015
        index: 0
        assign-to: EAIV6024
      - command: set
        target: EAIV6014
        value: EAIV6024.id
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016
      - command: platform-invoke
        handler: epn.agent.approval.latest
        assign-to: EAIV6017

# Approve the latest pending approval, or a specific approval if the
# contract passes one through.
- name-code: EALC6018
  name: Approve Latest Approval
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.approval.approve
        assign-to: EAIV6017

# Deny the latest pending approval, or a specific approval if the
# contract passes one through.
- name-code: EALC6019
  name: Deny Latest Approval
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.approval.deny
        assign-to: EAIV6017

# UI-first durable readiness plan: creates the Aha 6 work graph from Evo Chat
# without sending the phrase through the ordinary concierge/specialist route.
- name-code: EALC6020
  name: Check Remote Inference Readiness
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.run.planRemoteInferenceReadiness.chat
        assign-to: EAIV6002
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Advances the currently supported ready graph checks from Evo Chat and then
# refreshes the latest durable run header.
- name-code: EALC6021
  name: Run Ready Checks
  context:
    steps:
      - command: platform-subscribe
        stream: epn.agent.run.executeReadyChecks.progress
        target: EAIV6018
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Called by the Send button. Composes request, calls mesh service (now unary),
# and updates chat history.
#
# Flow:
# 1. Compose request (persona_id, conversation_id, text)
# 2. Call mesh service â†’ receive ONE complete response message
# 3. Append response to chat history
# 4. Extract conversation_id for next message
# 5. Update run status
- name-code: EALC6002
  name: Send Message
  context:
    steps:
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6001
        value: EAIV6014
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6002
        value: EAIV6019
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6003
        value: EAIV6005

      # Append user turn before sending so it appears immediately in the chat
      - command: set-map-value
        target-map: EAIV6028
        key: eamvt6004
        value: You
      - command: set-map-value
        target-map: EAIV6028
        key: eamvt6008
        value: EAIV6005
      - command: list-append
        target: EAIV6002
        value: EAIV6028

      # Invoke mesh service (unary RPC — returns single Map)
      - command: mesh-invoke
        capability: EAMC6002
        request: EAIV6003
        assign-to: EAIV6027

      # Append response message directly to chat history
      - command: list-append
        target: EAIV6002
        value: EAIV6027

      # Extract conversation_id from response message
      - command: set
        target: EAIV6019
        value: EAIV6027.eamvt6016

      # Refresh run status
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Clear conversation history and reset the session.
- name-code: EALC6003
  name: Clear Chat
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.chat.clear
        assign-to: EAIV6002

