# Called via on-appear when the chat page opens. Discovers specialist
# personas live from the daemon (epn.agent.personas) instead of the
# hardcoded Evo/Sigma/Lume picker -- see EAIV6015.
- name-code: EALC6015
  name: Init Personas
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.personas
        assign-to: EAIV6015
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016
      - command: platform-invoke
        handler: epn.agent.approval.latest
        assign-to: EAIV6017

# Approve the latest pending approval, or a specific approval if the
# contract passes one through.
- name-code: EALC6018
  name: Approve Latest Approval
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.approval.approve
        assign-to: EAIV6017

# Deny the latest pending approval, or a specific approval if the
# contract passes one through.
- name-code: EALC6019
  name: Deny Latest Approval
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.approval.deny
        assign-to: EAIV6017

# UI-first durable readiness plan: creates the Aha 6 work graph from Evo Chat
# without sending the phrase through the ordinary concierge/specialist route.
- name-code: EALC6020
  name: Check Remote Inference Readiness
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.run.planRemoteInferenceReadiness.chat
        assign-to: EAIV6002
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Advances the currently supported ready graph checks from Evo Chat and then
# refreshes the latest durable run header.
- name-code: EALC6021
  name: Run Ready Checks
  context:
    steps:
      - command: platform-subscribe
        stream: epn.agent.run.executeReadyChecks.progress
        target: EAIV6018
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Return the TextEditingController so the composer field can bind to it.
- name-code: EALC6001
  name: Get Input Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV6001

# Called by the Send button. The local UI composes EAIV6003 first, then the
# mesh invoke happens through the engine rather than the app shell.
# On first message, conversation_id is empty; daemon generates it and returns it
# in the response. We extract and store it in EAIV6019 for reuse.
- name-code: EALC6002
  name: Send Message
  context:
    steps:
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6001
        value: EAIV6014
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6002
        value: EAIV6019
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6003
        value: EAIV6001.text
      - command: mesh-invoke
        capability: EAMC6002
        request: EAIV6003
        assign-to: EAIV6002
      - command: set
        target: EAIV6019
        value: EAIV6002[0].eamvt6016
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Clear conversation history and reset the session.
- name-code: EALC6003
  name: Clear Chat
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.chat.clear
        assign-to: EAIV6002

# Called on-change of the input field (engine passes current text as 'text'
# param). Keeps the outbound request's text field in local memory so the
# send flow can compose the mesh request from local state.
- name-code: EALC6004
  name: Update Input Text
  context:
    expects:
      - text: ELVT1007
    steps:
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6003
        value: text

# ── Persona switcher ──────────────────────────────────────────────────────────
# Called via on-item-tap from the discovered persona list (EAIC6014, sourced
# from EAIV6015 / epn.agent.personas -- see EALC6015). `id` arrives from the
# tapped row (same proven pattern as epn_market's EALC13008 Select Offer).
# The concierge persona's id is 'epn.concierge.v1', not ''.
- name-code: EALC6016
  name: Use Discovered Persona
  context:
    expects:
      - id: ELVT1011
    steps:
      - command: set
        target: EAIV6014
        value: id

