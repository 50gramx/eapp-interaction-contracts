# Called via on-item-tap from the discovered persona list (EAIC6014, sourced
# from EAIV6015 / epn.agent.personas -- see EALC6015). `id` arrives from the
# tapped row (same proven pattern as epn_market's EALC13008 Select Offer).
# The concierge persona's id is 'epn.concierge.v1', not ''.
- name-code: EALC6016
  name: Use Discovered Persona
  context:
    expects:
      - id: ELVT1011
    steps:
      - command: set
        target: EAIV6014
        value: id

