# Called via on-appear when the chat page opens. Fixed to Evo-only (see the
# `set EAIV6014` step below) -- the user talks to Evo only; Evo silently
# consults specialists via consult_deployment_agent. There is no persona
# picker/discovery anymore (removed; see components file history).
- name-code: EALC6015
  name: Init Personas
  context:
    steps:
      # Restore the persisted rich chat history (Aha 1-5 persistence): the daemon
      # keeps the full Carbon-for-AI item shape on disk, so reopening the chat
      # after a restart restores the conversation — bubbles, work trails, approval
      # cards — instead of an empty list.
      - command: platform-invoke
        handler: epn.agent.chat.history
        assign-to: EAIV6002
      # Continue the same conversation for the next message rather than starting
      # a fresh session.
      - command: platform-invoke
        handler: epn.agent.chat.conversationId
        assign-to: EAIV6019
      # Workflows/jobs board: every durable run with its state.
      - command: platform-invoke
        handler: epn.agent.run.list
        assign-to: EAIV6031
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016
      - command: platform-invoke
        handler: epn.agent.approval.latest
        assign-to: EAIV6017
      # Fixed persona: always Evo (the concierge). This is not a "current
      # selection" anymore -- there is nothing else to select.
      - command: set
        target: EAIV6014
        value: epn.concierge.v1

# Approve the latest pending approval, or a specific approval if the
# contract passes one through.
- name-code: EALC6018
  name: Approve Latest Approval
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.approval.approve
        assign-to: EAIV6017
      # Aha 5 Phase 2: approving runs the deferred action as a durable task on the
      # daemon; reload the chat so the outcome ("Approved — started …") appears
      # inline, and refresh the latest-run header so the workflow is trackable.
      - command: platform-invoke
        handler: epn.agent.chat.history
        assign-to: EAIV6002
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016
      # Refresh the workflows board so the just-approved job's new state shows.
      - command: platform-invoke
        handler: epn.agent.run.list
        assign-to: EAIV6031

# Deny the latest pending approval, or a specific approval if the
# contract passes one through.
- name-code: EALC6019
  name: Deny Latest Approval
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.approval.deny
        assign-to: EAIV6017
      # Denying cancels the deferred action run; reload the chat so the
      # "Cancelled — … was not started" outcome appears inline.
      - command: platform-invoke
        handler: epn.agent.chat.history
        assign-to: EAIV6002

# UI-first durable readiness plan: creates the Aha 6 work graph from Evo Chat
# without sending the phrase through the ordinary concierge/specialist route.
- name-code: EALC6020
  name: Check Remote Inference Readiness
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.run.planRemoteInferenceReadiness.chat
        assign-to: EAIV6002
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Advances the currently supported ready graph checks from Evo Chat and then
# refreshes the latest durable run header.
- name-code: EALC6021
  name: Run Ready Checks
  context:
    steps:
      - command: platform-subscribe
        stream: epn.agent.run.executeReadyChecks.progress
        target: EAIV6018
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

# Clears all terminal (completed / failed / cancelled) runs from the disk store
# and refreshes the Workflows board.
- name-code: EALC6022
  name: Clear Finished Runs
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.run.dismiss
        params:
          finished: true
        assign-to: EAIV6031

# Dismiss one run by id (any status, incl. a stuck pending/running "ghost" that
# was interrupted and never resumes). Wired to the Workflows board's on-item-tap:
# the tapped row's `id` is passed as run_id. Reuses the existing dismiss handler
# (deletes ~/.epn/agent-runs/<id>.json) and refreshes the board.
- name-code: EALC6023
  name: Dismiss Run
  context:
    expects:
      - id: ELVT1011
    steps:
      - command: platform-invoke
        handler: epn.agent.run.dismiss
        params:
          run_id: id
        assign-to: EAIV6031

# â”€â”€ Workflows panel (footer-triggered, replaces the transcript view) â”€â”€â”€â”€â”€â”€â”€
# Opens the workflows panel: switches the main content match (EAIC6047) and
# the footer match (EAIC6046) over to the "workflows" view, and refreshes the
# board so it's current the moment it's shown.
- name-code: EALC6024
  name: Open Workflows
  context:
    steps:
      - command: set
        target: EAIV6046
        value: workflows
      - command: platform-invoke
        handler: epn.agent.run.list
        assign-to: EAIV6031

# Closes the workflows panel: switches both matches back to the chat view.
- name-code: EALC6025
  name: Close Workflows
  context:
    steps:
      - command: set
        target: EAIV6046
        value: chat

# Called by the Send button. Composes request, calls mesh service (now unary),
# and updates chat history.
#
# Flow:
# 1. Compose request (persona_id, conversation_id, text)
# 2. Call mesh service â†’ receive ONE complete response message
# 3. Append response to chat history
# 4. Extract conversation_id for next message
# 5. Update run status
- name-code: EALC6002
  name: Send Message
  context:
    steps:
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6001
        value: EAIV6014
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6002
        value: EAIV6019
      - command: set-map-value
        target-map: EAIV6003
        key: EAMVT6003
        value: EAIV6005

      # Append user turn before sending so it appears immediately in the chat
      - command: set-map-value
        target-map: EAIV6028
        key: eamvt6004
        value: You
      - command: set-map-value
        target-map: EAIV6028
        key: eamvt6008
        value: EAIV6005
      - command: list-append
        target: EAIV6002
        value: EAIV6028

      # Clear the composer input immediately on send so the field empties and
      # the just-sent text is not left sitting in the box.
      - command: set
        target: EAIV6005
        value: ""

      # Show the animated "thinking" indicator (EAIC6040) while the unary
      # response is in flight: build the thinking item and append it to the
      # transient pending-turn list.
      - command: set-map-value
        target-map: EAIV6030
        key: thinking
        value: true
      - command: list-append
        target: EAIV6029
        value: EAIV6030

      # Invoke mesh service (unary RPC — returns single Map)
      - command: mesh-invoke
        capability: EAMC6002
        request: EAIV6003
        assign-to: EAIV6027

      # Response has arrived — hide the thinking indicator.
      - command: set
        target: EAIV6029
        value: []

      # Append response message directly to chat history
      - command: list-append
        target: EAIV6002
        value: EAIV6027

      # Extract conversation_id from response message
      - command: set
        target: EAIV6019
        value: EAIV6027.eamvt6016

      # Refresh run status
      - command: platform-invoke
        handler: epn.agent.run.latest
        assign-to: EAIV6016

      # Aha 5: refresh latest approval so a pending approval the agent just
      # created (e.g. for a state-changing action) surfaces immediately in the
      # approve/deny card without waiting for the next page open.
      - command: platform-invoke
        handler: epn.agent.approval.latest
        assign-to: EAIV6017

# Start a NEW conversation: clear the on-screen thread and reset the session so
# the next message opens a fresh conversation on the daemon. Non-destructive —
# prior conversations are preserved on disk (see epn.agent.chat.new).
- name-code: EALC6003
  name: New Chat
  context:
    steps:
      - command: platform-invoke
        handler: epn.agent.chat.new
        assign-to: EAIV6002

