# Community 50 - Eutopia Browser and EP&N eApps
# Only entries with `live: true` are loaded and discoverable in the live browser.
# Plain string entries (legacy format) are not live-gated and will be skipped.

- organisation: ethos_browser
  brand:
    id: evo
    community-code: 50
    display-name: EVO Browser
    product-name: EVO Browser
    window-title: EVO Browser
    logo: lib/assets/ethosverse-browser-logo-v3-transparent.png
    home-app: evo_dl
    launch-environment: com.50gramx.50.ethos_browser.*
    runtime:
      session-file: evo_session.json
      singleton-name: 50gramx_evo_singleton
    windows:
      binary-name: eapp_live
      installer-output-name: EvoSetup
      installer-default-dir: EvoBrowser
      window-title: EVO Browser
      product-name: EVO Browser
      company-name: 50GRAMx
      file-description: EVO Browser
      internal-name: eapp_live
      original-filename: eapp_live.exe
      legal-copyright: Copyright (C) 2026 50GRAMx. All rights reserved.
      icon: resources\\app_icon.ico
  apps:
    - name: evo_dl
      live: true
    - name: evo_privacy
      live: true
    - name: evo_history
      live: true
    - name: evo_wasm
      live: true
    - name: evo_pods
      live: true
    - name: evo_llm
      live: true
    - name: evo_mail
      live: true

# EP&N DePIN node platform — its own organisation so the dashboard's
# org-solution shell scopes the ten eApps as one product, distinct from the
# browser (evo_*) apps.
- organisation: epn
  brand:
    id: epn
    community-code: 50
    display-name: EP&N
    product-name: EP&N Node
    window-title: EP&N Node
    # Placeholder: no dedicated EP&N logo asset exists/bundles yet, so point at
    # the default bundled logo to avoid a broken image. Replace with
    # lib/assets/brands/epn/logo.png once that asset is added to pubspec assets.
    logo: lib/assets/ethosverse-browser-logo-v3-transparent.png
    home-app: epn_home
    launch-environment: com.50gramx.50.epn.*
    runtime:
      session-file: epn_session.json
      singleton-name: 50gramx_epn_singleton
    windows:
      binary-name: epn_node
      installer-output-name: EpnNodeSetup
      installer-default-dir: EpnNode
      window-title: EP&N Node
      product-name: EP&N Node
      company-name: 50GRAMx
      file-description: EP&N Node
      internal-name: epn_node
      original-filename: epn_node.exe
      legal-copyright: Copyright (C) 2026 50GRAMx. All rights reserved.
      icon: resources\\app_icon.ico
    surface:
      tiles:
        app-library: false
        private-space: false
        history: false
        pane-switcher: false
        spotlight: false
        open-tabs-summary: false
        open-communities-summary: false
        user-details: false
      open-pages:
        page-tabs: false
        clear-session-on-start: true
      solution-nav:
        unbounded: true
      wallpaper:
        preferred: mesh
        show-credit: false
      app-selector:
        auto-visible: false
      browser:
        # EP&N is a node app, not a browser — never prompt to become the OS
        # default browser.
        show-default-prompt: false
    sidecars:
      epnd: true
  apps:
    - name: epn_home
      live: true
    - name: epn_agent_chat
      live: true
    - name: epn_node
      live: true
    - name: epn_peers
      live: true
    - name: epn_wallet
      live: true
    - name: epn_deployments
      live: true
    - name: epn_metering
      live: true
    - name: epn_settings
      live: true
    - name: epn_market
      live: true
    - name: epn_circle
      live: true

