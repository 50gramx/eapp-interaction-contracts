# ── Design framing (chip + intent copy + local footer) ────────────────────────
- name-code: EAIC9060
  name: Language Chip
  component:
    name-code: EIC1030
    label: CARBON · instrument
    status: neutral

- name-code: EAIC9061
  name: Intent Copy
  component:
    name-code: EIC1020
    text: You name the outcome; the machine decides how. What runs underneath never surfaces here — only what each operator is doing for you, honestly.
    variant: caption01
    color: on-surface-subtle

- name-code: EAIC9062
  name: Local Footer
  component:
    name-code: EIC1020
    text: Every answer was computed on this device — your prompts and outputs never left it. Only the resources you choose to lend ever leave, by your consent.
    variant: caption01
    color: on-surface-subtle
