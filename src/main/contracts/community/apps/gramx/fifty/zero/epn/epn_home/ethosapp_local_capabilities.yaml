# Spin up the built-in FileSystem operator.
- name-code: EALC5001
  name: Start FileSystem
  context:
    steps:
      - command: platform-invoke
        handler: epn.deployments.spinup
        params:
          deployment_id: epn.filesystem.v1-dep

# Spin down the FileSystem operator.
- name-code: EALC5002
  name: Stop FileSystem
  context:
    steps:
      - command: platform-invoke
        handler: epn.deployments.spindown
        params:
          deployment_id: epn.filesystem.v1-dep

# Refresh the KYC status from the REST API.
- name-code: EALC5003
  name: Load KYC Status
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.kyc
        assign-to: EAIV5002
      - command: get-map-value
        target-map: EAIV5002
        key: kyc_level
        assign-to: EAIV5015
      - command: if
        condition:
          - EAIV5015
          - greater-than
          - 0
        then:
          - command: set
            target: EAIV5014
            value: "verified"
        else:
          - command: set
            target: EAIV5014
            value: "none"

# Initiate EMAIL-level self-attestation, then refresh KYC status.
- name-code: EALC5004
  name: Attest Email
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.initiate_kyc
        assign-to: EAIV5003
      - command: platform-invoke
        handler: epn.identity.kyc
        assign-to: EAIV5002

# Init page — loads only data rendered by Home.
- name-code: EALC5005
  name: Init Page
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.capacity
        assign-to: EAIV5008
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV5004
      # Without this, EAIV5002/5014 stay at their defaults until the user
      # manually triggers something that happens to refresh KYC status --
      # confirmed live: a previously-verified user would see the unverified
      # glance card on every fresh app launch until they clicked something.
      - command: call
        capability: EALC5003

# Start the local node from Home — invokes the SAME host platform handler that
# epn_node uses (epn.node.start → NodeController singleton). The shared surface
# between sibling eApps is the host handler, not the other eApp's contract, so
# no cross-eApp contract reference is needed. Refreshes identity after so the
# hero reflects the new (online) state.
- name-code: EALC5014
  name: Start Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.start
        assign-to: EAIV5006
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV5004

# Stop the local node from Home — same shared host handler epn_node uses
# (epn.node.stop only stops a daemon we started). Refreshes identity after.
- name-code: EALC5015
  name: Stop Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.stop
        assign-to: EAIV5006
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV5004

# First-run setup: install the node binary in-app (epn.node.install), then start
# with k3s provisioning (bootstrap). Removes the EPND_PATH dependency — the node
# ships via the app. All three steps reuse shared host handlers.
- name-code: EALC5016
  name: Set Up Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.install
        assign-to: EAIV5006
      - command: platform-invoke
        handler: epn.node.start
        params:
          bootstrap: "true"
        assign-to: EAIV5006
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV5004

# ── Cross-eApp room navigation (nav-link, EIC1035) ────────────────────────────
# Each opens a sibling eApp in the `epn` org via the host's nav capability.

# Open the Node room.
- name-code: EALC5006
  name: Open Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_node

# Open the Metering room.
- name-code: EALC5007
  name: Open Metering
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_metering

# Open the Operators (deployments) room.
- name-code: EALC5008
  name: Open Operators
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_deployments

# Open the Network (peers) room.
- name-code: EALC5009
  name: Open Network
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_peers

# Open the Resource Market room.
- name-code: EALC5010
  name: Open Market
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_market

# Open the Wallet room.
- name-code: EALC5011
  name: Open Wallet
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_wallet

# Open the Settings room.
- name-code: EALC5012
  name: Open Settings
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_settings

# Open Evo, the EP&N concierge.
- name-code: EALC5013
  name: Open Evo
  context:
    steps:
      - command: platform-invoke
        handler: epn.nav.open
        params:
          app: epn_agent_chat

# ── Identity & Trust flow (SA-KYC-MAIL-UI) ────────────────────────────────────

# Returns the email input's TextEditingController (mirrors epn_wallet's
# "Get Peer Controller" / EALC8003 pattern).
- name-code: EALC5017
  name: Get KYC Email Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV5010

# Tapping "Verify your email" from the glance card — advance to the Add
# Email tile, clearing any stale error from a previous attempt.
- name-code: EALC5018
  name: Start Email Verify
  context:
    steps:
      - command: set
        target: EAIV5009
        value: "addEmail"
      - command: set
        target: EAIV5012
        value: ""

# Submit the email: initiates via the real first-party issuer. No
# client-side format check — the contract engine has no validate/regex
# command (confirmed against eapp-flow-bob's command registry: require,
# set, if, get-map-value, set-map-value, call, string-*, list-*, return,
# platform-invoke, platform-subscribe — nothing email/regex-shaped).
# Malformed addresses are rejected server-side (Firebase Auth) and surface
# through the same generic error path as offline/dedup. On success, advance
# to Inbox; on error, surface it inline and stay on Add Email.
- name-code: EALC5019
  name: Submit KYC Email
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.initiate_kyc
        params:
          email: EAIV5010
        assign-to: EAIV5003
      - command: get-map-value
        target-map: EAIV5003
        key: error
        assign-to: EAIV5012
      - command: if
        condition:
          - EAIV5012
          - equals
          - ""
        then:
          - command: set
            target: EAIV5009
            value: "inbox"

# Open the device's default mail app from the Inbox tile.
- name-code: EALC5020
  name: Open Mail App
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.open_mail_app

# Manual poll — "I've verified, check now". No auto-refresh loop: this
# engine's platform-stream binding (used by epn.node.status) takes no
# per-call params, and PollKYC needs a dynamic session_id from the just-
# completed Initiate call, which isn't confirmed wireable into a stream's
# default binding. A manual check is the verified-safe primitive instead.
- name-code: EALC5021
  name: Check KYC Now
  context:
    steps:
      - command: get-map-value
        target-map: EAIV5003
        key: session_id
        assign-to: EAIV5013
      - command: platform-invoke
        handler: epn.identity.poll_kyc
        params:
          session_id: EAIV5013
        assign-to: EAIV5013
      - command: get-map-value
        target-map: EAIV5013
        key: complete
        assign-to: EAIV5012
      - command: if
        condition:
          - EAIV5012
          - equals
          - true
        then:
          - command: set
            target: EAIV5009
            value: "verified"
          - command: platform-invoke
            handler: epn.identity.kyc
            assign-to: EAIV5002
          - command: get-map-value
            target-map: EAIV5002
            key: kyc_level
            assign-to: EAIV5015
          - command: if
            condition:
              - EAIV5015
              - greater-than
              - 0
            then:
              - command: set
                target: EAIV5014
                value: "verified"
            else:
              - command: set
                target: EAIV5014
                value: "none"
          - command: set
            target: EAIV5012
            value: ""

# Resend — re-runs Submit with the same (unedited) controller value.
- name-code: EALC5022
  name: Resend KYC Email
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.initiate_kyc
        params:
          email: EAIV5010
        assign-to: EAIV5003
      - command: get-map-value
        target-map: EAIV5003
        key: error
        assign-to: EAIV5012

# "Change" from Inbox — back to Add Email to edit the address.
- name-code: EALC5023
  name: Use Different KYC Email
  context:
    steps:
      - command: set
        target: EAIV5009
        value: "addEmail"
      - command: set
        target: EAIV5012
        value: ""

# "Done" from the Verified confirmation tile — back to the glance card.
- name-code: EALC5024
  name: Finish KYC Verify
  context:
    steps:
      - command: set
        target: EAIV5009
        value: "glance"
