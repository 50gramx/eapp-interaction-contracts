# Mesh capability demo: shows the full contract surface used by future mesh eApps.
# - EAMC8001: unary request / response
# - EAMC8002: client-streaming request
# - EAMC8003: server-streaming response
# - EAMC8004: bidirectional streaming request/response

- name-code: EAMC8001
  name: Fetch Mesh Profile
  mesh:
    context: discover
    method: EAMC8001
    expects: EAMV8002
    returns: EAMV8001

- name-code: EAMC8002
  name: Stream Input Profile
  mesh:
    context: discover
    method: EAMC8002
    expecting: EAMV8002
    returns: EAMV8001

- name-code: EAMC8003
  name: Stream Output Profile
  mesh:
    context: discover
    method: EAMC8003
    expects: EAMV8002
    returning: EAMV8001

- name-code: EAMC8004
  name: Bidi Stream Profile
  mesh:
    context: discover
    method: EAMC8004
    expecting: EAMV8002
    returning: EAMV8001
