# Live node lifecycle status — {state, did, peer_id, online, offline_reason,
# externally_managed, failure}. Fed by the epn.node.status platform stream.
# state ∈ notRunning | starting | running | degraded | externallyManaged | failed
- name-code: EAIV14001
  name: Node Status
  type: ELVT1020
  default:
    platform-stream: epn.node.status

# Result of the last start attempt — the status map after starting, or {failure:...}.
- name-code: EAIV14002
  name: Start Result
  type: ELVT1020
  default: {}

# Result of the last stop attempt — the status map after stopping.
- name-code: EAIV14003
  name: Stop Result
  type: ELVT1020
  default: {}

# ── Sovereign endpoint: share a local service / connect to a peer's ──
- name-code: EAIV14010
  name: Expose Target Controller
  type: ELVT1001
  default: {}
- name-code: EAIV14011
  name: Expose Result
  type: ELVT1007
  default: ""
- name-code: EAIV14012
  name: My Identity
  type: ELVT1020
  default: {}
- name-code: EAIV14013
  name: Peer Maddr Controller
  type: ELVT1001
  default: {}
- name-code: EAIV14014
  name: Local Port Controller
  type: ELVT1001
  default: {}
- name-code: EAIV14015
  name: Connect Result
  type: ELVT1007
  default: ""
