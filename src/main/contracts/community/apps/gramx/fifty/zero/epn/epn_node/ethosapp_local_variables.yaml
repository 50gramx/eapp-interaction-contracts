# Live node lifecycle status — {state, did, peer_id, online, offline_reason,
# externally_managed, failure}. Fed by the epn.node.status platform stream.
# state ∈ notRunning | starting | running | degraded | externallyManaged | failed
- name-code: EAIV14001
  name: Node Status
  type: ELVT1020
  default:
    platform-stream: epn.node.status

# This device's live contribution to the EP&N network — {cores_offered,
# host_cores, cores_display, storage_offered_gib, storage_display,
# tunnel_live, tunnel_status}. Sums lent cores/storage across every running
# compute (k3s) node on this device, vs total host cores. tunnel_status ∈
# live | off. Fed by the epn.node.network_contribution platform stream.
- name-code: EAIV14040
  name: Network Contribution
  type: ELVT1020
  default:
    platform-stream: epn.node.network_contribution

# Per-platform node capabilities — {class: mobile|desktop, supports_compute:
# bool, supports_lite: bool}. Populated on page-appear from
# epn.node.capabilities. Drives whether the "compute / upgrade to k3s"
# affordances render: mobile devices run the lite node only. Default {} so the
# gate falls back to the desktop (compute-visible) branch until it loads —
# desktop never loses its compute UI to a slow/failed fetch; only an explicit
# class == mobile hides it.
- name-code: EAIV14049
  name: Node Capabilities
  type: ELVT1020
  default: {}

# Result of the last start attempt — the status map after starting, or {failure:...}.
- name-code: EAIV14002
  name: Start Result
  type: ELVT1020
  default: {}

# Result of the last stop attempt — the status map after stopping.
- name-code: EAIV14003
  name: Stop Result
  type: ELVT1020
  default: {}

# ── Sovereign endpoint: share a local service / connect to a peer's ──
- name-code: EAIV14010
  name: Expose Target Controller
  type: ELVT1001
  default: {}
- name-code: EAIV14011
  name: Expose Result
  type: ELVT1007
  default: ""
- name-code: EAIV14012
  name: My Identity
  type: ELVT1020
  default: {}
- name-code: EAIV14013
  name: Peer Maddr Controller
  type: ELVT1001
  default: {}
- name-code: EAIV14014
  name: Local Port Controller
  type: ELVT1001
  default: {}
- name-code: EAIV14015
  name: Connect Result
  type: ELVT1007
  default: ""

# ══════════════════════════════════════════════════════════════════════════════
# Multi-node management — every node on this device, add/stop/remove + device clean
# ══════════════════════════════════════════════════════════════════════════════

# All nodes on this device — render-ready maps {id, distro, state, label, detail}
# from epn.node.list (returns a bare list). Bound directly by the EIC1026 list.
- name-code: EAIV14020
  name: Nodes
  type: ELVT1020
  default: []

# TextEditingController for the "add a node" name input.
- name-code: EAIV14021
  name: New Node Id Controller
  type: ELVT1001
  default: {}

# Result of the last add/create attempt — {ok, node_id, error, ...}.
- name-code: EAIV14022
  name: Create Result
  type: ELVT1019
  default: {}

# The node the user tapped in the list — drives the stop/remove action card.
- name-code: EAIV14023
  name: Selected Node Id
  type: ELVT1007
  default: ""
- name-code: EAIV14024
  name: Selected Node Label
  type: ELVT1007
  default: ""
- name-code: EAIV14025
  name: Selected Node State
  type: ELVT1007
  default: ""

# Selection flag for the EIC1036 match: "none" (nothing tapped) | "selected".
- name-code: EAIV14026
  name: Selection Flag
  type: ELVT1007
  default: "none"

# Result of the last stop/remove on the selected node — {ok, error, ...}.
- name-code: EAIV14027
  name: Action Result
  type: ELVT1019
  default: {}

# Result of the last device-clean — {ok, error, ...}.
- name-code: EAIV14028
  name: Clean Result
  type: ELVT1019
  default: {}

# Human-readable confirmation of the last management action (remove / clean),
# extracted to a plain string so it renders without a dotted reactive binding.
- name-code: EAIV14030
  name: Result Message
  type: ELVT1007
  default: ""
