    variant: caption
    color: 0xFFE53935

- name-code: EAIC7027
  name: Find Result Trust Label
  component:
    name-code: EIC1020
    text: EAIV7006.trust_label
    variant: caption
    color: 0xFF4CAF50

- name-code: EAIC7028
  name: Find Result GPU Label
  component:
    name-code: EIC1020
    text: EAIV7006.gpu_class
    variant: caption
    color: 0xFF1565C0

- name-code: EAIC7025
  name: Find Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC7019
      - EAIC7020
      - EAIC7021
      - EAIC7022
      - EAIC7023
