# ── Identity section ──────────────────────────────────────────────────────────

- name-code: EAIC7001
  name: Identity Header
  component:
    name-code: EIC1004
    label: This Node

- name-code: EAIC7002
  name: DID Label
  component:
    name-code: EIC1020
    text: EAIV7001.did
    variant: body2

- name-code: EAIC7003
  name: PeerID Label
  component:
    name-code: EIC1020
    text: EAIV7001.peer_id
    variant: caption
    color: 0xFF9E9E9E

- name-code: EAIC7004
  name: Refresh Identity Button
  component:
    name-code: EIC1008
    label: Refresh
    on-click: EALC7001

- name-code: EAIC7029
  name: My Multiaddr QR Label
  component:
    name-code: EIC1020
    text: Scan to pair (multiaddr)
    variant: caption
    align: center
    color: 0xFF9E9E9E

- name-code: EAIC7030
  name: My Multiaddr QR
  component:
    name-code: EIC1027
    data: EAIV7001.addrs.0
    size: 200
    background-color: 0xFFFFFFFF

# ── Peers section ─────────────────────────────────────────────────────────────

- name-code: EAIC7005
  name: Peers Header
  component:
    name-code: EIC1004
    label: Connected Peers

- name-code: EAIC7006
  name: Peer List View
  component:
    name-code: EIC1026
    source: EAIV7002
    item-type: list-item
    title-field: did
    subtitle-field: trust_label
    trailing-field: gpu_class
    scrollable: true
    max-height: 280

- name-code: EAIC7007
  name: No Peers Label
  component:
    name-code: EIC1020
    text: No peers connected yet. Share your multiaddr or add a bootstrap peer.
    variant: body2
    align: center
    color: 0xFF9E9E9E

- name-code: EAIC7011
  name: Refresh Peers Button
  component:
    name-code: EIC1008
    label: Refresh Peers
    on-click: EALC7002

# ── Connect section ───────────────────────────────────────────────────────────

- name-code: EAIC7012
  name: Connect Header
  component:
    name-code: EIC1004
    label: Connect to Peer

- name-code: EAIC7013
  name: Multiaddr Input
  component:
    name-code: EIC1009
    hint-text: /ip4/1.2.3.4/tcp/50590/p2p/12D3…
    text-controller: EALC7003

- name-code: EAIC7014
  name: Connect Button
  component:
    name-code: EIC1006
    label: Connect
    on-click: EALC7004

- name-code: EAIC7015
  name: Connect Result Label
  component:
    name-code: EIC1020
    text: EAIV7004
    variant: caption
    color: 0xFF9E9E9E

- name-code: EAIC7016
  name: Connect Action Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC7014
      - EAIC7011

# ── Find by DID section ───────────────────────────────────────────────────────

- name-code: EAIC7019
  name: Find Header
  component:
    name-code: EIC1004
    label: Find Peer by DID

- name-code: EAIC7020
