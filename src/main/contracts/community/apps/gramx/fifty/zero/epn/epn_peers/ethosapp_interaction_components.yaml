  component:
    name-code: EIC1006
    label: Search DHT
    on-click: EALC7006

- name-code: EAIC7022
  name: Find Result DID Label
  component:
    name-code: EIC1020
    text: EAIV7006.did
    variant: body2

- name-code: EAIC7023
  name: Find Result PeerID Label
  component:
    name-code: EIC1020
