# ── Identity section ──────────────────────────────────────────────────────────

- name-code: EAIC7001
  name: Identity Header
  component:
    name-code: EIC1004
    label: Your identity — sovereign, portable

- name-code: EAIC7050
  name: Language Chip
  component:
    name-code: EIC1030
    label: CARBON · instrument
    status: neutral

- name-code: EAIC7051
  name: Sovereign Copy
  component:
    name-code: EIC1020
    text: One device, one root identity. Roles — operator, lender, buyer — are hats on the same head, not new identities.
    variant: caption
    color: on-surface-subtle

- name-code: EAIC7052
  name: Reachable Caption
  component:
    name-code: EIC1020
    text: Reachable at — your addresses, where peers can knock
    variant: caption
    color: on-surface-subtle

- name-code: EAIC7002
  name: DID Label
  component:
    name-code: EIC1020
    text: EAIV7001.did
    variant: body2

- name-code: EAIC7003
  name: PeerID Label
  component:
    name-code: EIC1020
    text: EAIV7001.peer_id
    variant: caption
    color: on-surface-subtle

- name-code: EAIC7004
  name: Refresh Identity Button
  component:
    name-code: EIC1008
    label: Refresh
    on-click: EALC7001

- name-code: EAIC7029
  name: My Multiaddr QR Label
  component:
    name-code: EIC1020
    text: Scan to pair (multiaddr)
    variant: caption
    align: center
    color: on-surface-subtle

- name-code: EAIC7030
  name: My Multiaddr QR
  component:
    name-code: EIC1027
    data: EAIV7001.addrs.0
    size: 200
    background-color: surface

# ── Peers section ─────────────────────────────────────────────────────────────

- name-code: EAIC7005
  name: Peers Header
  component:
    name-code: EIC1004
    label: Connected Peers

- name-code: EAIC7031
  name: Verified Family Badge
  component:
    name-code: EIC1030
    label: verified family
    status: positive

- name-code: EAIC7006
  name: Peer Table
  component:
    name-code: EIC1032
    source: EAIV7002
    columns:
      - Peer
      - Address
      - Trust
    fields:
      - did
      - addrs.0
      - trust_label
    empty-message: No peers connected yet. Share your multiaddr or add a bootstrap peer.

- name-code: EAIC7011
  name: Refresh Peers Button
  component:
    name-code: EIC1008
    label: Refresh Peers
    on-click: EALC7002

