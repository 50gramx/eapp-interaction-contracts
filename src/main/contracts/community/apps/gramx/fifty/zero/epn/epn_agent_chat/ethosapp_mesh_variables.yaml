# EAMV6002 - ChatMessage (UI-fed response shape for the chat list)
#
# This is the mesh response shape the UI can consume directly, without a
# separate normalization/folding step in the local capability layer. The
# generated consumer and daemon wrapper should emit message snapshots in
# this evolved shape so EAIC6002 can bind them as-is.
- name-code: EAMV6002
  name: Chat Message
  type: ELVT1021
  modelled: true
  properties:
    - name-code: EAMVT6004
      name: role
      type: ELVT1007
      default: ""
    - name-code: EAMVT6008
      name: text
      type: ELVT1007
      default: ""
    - name-code: EAMVT6009
      name: ai
      type: ELVT1002
      default: false
    - name-code: EAMVT6010
      name: persona_id
      type: ELVT1007
      default: ""
    - name-code: EAMVT6011
      name: locality
      type: ELVT1007
      default: "local"
    - name-code: EAMVT6012
      name: grounding
      type: ELVT1007
      default: "general_guidance"
    - name-code: EAMVT6013
      name: activity
      type: ELVT1018
      default: []
    - name-code: EAMVT6014
      name: evidence
      type: ELVT1018
      default: []
    - name-code: EAMVT6015
      name: errors
      type: ELVT1018
      default: []
    - name-code: EAMVT6016
      name: conversation_id
      type: ELVT1007
      default: ""
    # Tile/card variation (Aha 5). kind = "message" (default bubble) or
    # "approval" (the Carbon approve/deny card). approval_* fields carry the
    # pending action so the card can show risk/cost/target and act on it.
    - name-code: EAMVT6017
      name: kind
      type: ELVT1007
      default: "message"
    - name-code: EAMVT6018
      name: approval_id
      type: ELVT1007
      default: ""
    - name-code: EAMVT6019
      name: risk
      type: ELVT1007
      default: ""
    - name-code: EAMVT6020
      name: cost
      type: ELVT1007
      default: ""
    - name-code: EAMVT6021
      name: target
      type: ELVT1007
      default: ""
    # EAMVT6022 - actions: the decisions this turn is WAITING ON.
    #
    # A list of {id, label, kind, action_id, target, authority}. One list,
    # produced once by the daemon, rendered by every surface: the approve/deny
    # card in the app's footer AND the buttons under Evo's reply in a gramx
    # room. Until now an approval could only be acted on from the app — the
    # footer card read the LOCAL approval store and acted on "the latest
    # pending" — so the same turn, answered in a room, could DESCRIBE an install
    # but never OFFER it. The chat deviated purely because its interface was a
    # post.
    #
    # `action_id` is what makes that fixable: an action is ADDRESSED (it names
    # the approval it acts on) rather than positional. "Latest pending" only ever
    # worked because the one person who could see it was sitting at the machine;
    # a post is read by strangers, on phones, days later, with several approvals
    # outstanding. Authority to TAKE the action stays the gram owner's key, so a
    # public room may safely SHOW a decision that only one person may take.
    #
    # Supersedes EAMVT6017-6021 (the approval-tile fields), which no component
    # binds today. Those stay for compatibility; new surfaces read this.
    - name-code: EAMVT6022
      name: actions
      type: ELVT1018
      default: []

