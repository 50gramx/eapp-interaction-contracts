# Status card — reactive list-item showing current identity state.
# Rebuilds automatically when identity.status stream emits.
- name-code: EAIC7001
  name: Identity Status Card
  component:
    name-code: EIC1026
    source: EAIV7001
    item-type: list-item
    title-field: statusLabel
    subtitle-field: statusSublabel

# Username / activation code input field.
# text-controller wires EIC1009 to EAIV7002 (ELVT1001).
# on-change buffers text in Dart via identity.storeInput (300ms debounced).
- name-code: EAIC7002
  name: Username Field
  component:
    name-code: EIC1009
    hint-text: Enter username or activation code...
    text-controller: EALC7001

# Primary action: Create Guest Account.
- name-code: EAIC7003
  name: Create Guest Button
  component:
    name-code: EIC1006
    label: Create Guest Account
    on-click: EALC7004

# Secondary action: Activate Account.
- name-code: EAIC7004
  name: Activate Button
  component:
    name-code: EIC1008
    label: Activate Account
    on-click: EALC7005

# Divider between action and footer sections.
- name-code: EAIC7005
  name: Divider
  component:
    name-code: EIC1025
    height: 1

# Reset button — dev/testing utility.
- name-code: EAIC7006
  name: Reset Identity Button
  component:
    name-code: EIC1008
    label: Reset Identity
    on-click: EALC7006
