# Start the local node in LITE mode (identity + wallet + AI, no k3s).
# Detect-before-spawn: adopts a daemon that is already running.
- name-code: EALC14001
  name: Start Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.start
        params:
          lite: "true"
        assign-to: EAIV14002

# Stop the local node — only if this app started it.
- name-code: EALC14002
  name: Stop Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.stop
        assign-to: EAIV14003

# First-run start that also provisions k3s (opt-in compute node).
- name-code: EALC14003
  name: Bootstrap Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.bootstrap
        assign-to: EAIV14002

# ── Sovereign endpoint capabilities ──
- name-code: EALC14012
  name: Load Identity
  context:
    steps:
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV14012

- name-code: EALC14010
  name: Get Expose Target Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV14010

- name-code: EALC14011
  name: Expose Service
  context:
    steps:
      - command: platform-invoke
        handler: epn.tunnel.expose
        params:
          target: EAIV14010
        assign-to: EAIV14011
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV14012

- name-code: EALC14013
  name: Get Peer Maddr Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV14013

- name-code: EALC14014
  name: Get Local Port Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV14014

- name-code: EALC14015
  name: Connect Endpoint
  context:
    steps:
      - command: platform-invoke
        handler: epn.tunnel.connect
        params:
          peer: EAIV14013
          local_port: EAIV14014
        assign-to: EAIV14015

# ══════════════════════════════════════════════════════════════════════════════
# Multi-node management capabilities
# ══════════════════════════════════════════════════════════════════════════════

# Page on-appear: load identity (for the sovereign-endpoint section) and the
# live list of every node on this device. Replaces the bare Load Identity as the
# page's on-appear so the node list is populated the moment the page opens.
- name-code: EALC14020
  name: On Node Page Appear
  context:
    steps:
      - command: platform-invoke
        handler: epn.peers.identity
        assign-to: EAIV14012
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020
      # Per-platform capabilities — hides the compute/upgrade affordances on
      # mobile (lite-only devices). See EAIV14049 and the EAIC142{60,62,63} gates.
      - command: platform-invoke
        handler: epn.node.capabilities
        assign-to: EAIV14049

# Re-list the device's nodes (after any add/stop/remove/clean).
- name-code: EALC14021
  name: Refresh Nodes
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020

# Return the "add a node" name TextEditingController.
- name-code: EALC14022
  name: Get New Node Id Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV14021

# Add a lite node (device-safe default: p2p + identity + wallet, no k3s).
- name-code: EALC14023
  name: Add Lite Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.create
        params:
          node_id: EAIV14021
          lite: "true"
        assign-to: EAIV14022
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020

# Add a compute node — provisions its own k3s/distro (heavier, opt-in).
- name-code: EALC14024
  name: Add Compute Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.create
        params:
          node_id: EAIV14021
          lite: "false"
          bootstrap: "true"
        assign-to: EAIV14022
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020

# Select a node from the list (engine passes the tapped node's full map). Stores
# id/label/state and computes a contextual flag so the action card offers only
# the actions that make sense: Stop for a running node, Start for a stopped one,
# Remove only for named instances (the primary is torn down via "Remove
# everything"). Flag ∈ primary-running | primary-stopped | named-running |
# named-stopped | none.
- name-code: EALC14025
  name: Select Node
  context:
    expects:
      - id: ELVT1007
      - label: ELVT1007
      - state: ELVT1007
    steps:
      - command: set
        target: EAIV14023
        value: id
      - command: set
        target: EAIV14024
        value: label
      - command: set
        target: EAIV14025
        value: state
      - command: if
        condition:
          - EAIV14023
          - equals
          - ""
        then:
          - command: if
            condition:
              - EAIV14025
              - equals
              - running
            then:
              - command: set
                target: EAIV14026
                value: "primary-running"
            else:
              - command: set
                target: EAIV14026
                value: "primary-stopped"
        else:
          - command: if
            condition:
              - EAIV14025
              - equals
              - running
            then:
              - command: set
                target: EAIV14026
                value: "named-running"
            else:
              - command: set
                target: EAIV14026
                value: "named-stopped"

# Stop the selected node. Primary ('' id) uses the singleton stop; a named
# instance uses stop_instance. Collapses the card; the list reflects the change.
- name-code: EALC14026
  name: Stop Selected Node
  context:
    steps:
      - command: if
        condition:
          - EAIV14023
          - equals
          - ""
        then:
          - command: platform-invoke
            handler: epn.node.stop
            assign-to: EAIV14027
        else:
          - command: platform-invoke
            handler: epn.node.stop_instance
            params:
              node_id: EAIV14023
            assign-to: EAIV14027
      - command: set
        target: EAIV14026
        value: "none"
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020

# Start the selected node. Primary ('' id) uses the singleton start; a named
# instance is (re)started lite via create. Collapses the card after.
- name-code: EALC14029
  name: Start Selected Node
  context:
    steps:
      - command: if
        condition:
          - EAIV14023
          - equals
          - ""
        then:
          - command: platform-invoke
            handler: epn.node.start
            params:
              lite: "true"
            assign-to: EAIV14027
        else:
          - command: platform-invoke
            handler: epn.node.create
            params:
              node_id: EAIV14023
              lite: "true"
            assign-to: EAIV14027
      - command: set
        target: EAIV14026
        value: "none"
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020

# Remove a named node entirely: stop its process, then unregister its distro and
# delete its home. Only offered for named instances — the primary's full
# teardown is "Remove everything" (device clean), which is clearer. Destructive.
- name-code: EALC14027
  name: Remove Selected Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.stop_instance
        params:
          node_id: EAIV14023
        assign-to: EAIV14027
      - command: platform-invoke
        handler: epn.node.remove
        params:
          node_id: EAIV14023
        assign-to: EAIV14027
      - command: set
        target: EAIV14030
        value: "Node removed."
      - command: set
        target: EAIV14026
        value: "none"
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020

# Remove EP&N's entire footprint from this device (~/.epn + all distros). Destructive.
- name-code: EALC14028
  name: Clean Device
  context:
    steps:
      - command: platform-invoke
        handler: epn.device.clean
        assign-to: EAIV14028
      - command: get-map-value
        target-map: EAIV14028
        key: output
        assign-to: EAIV14030
      - command: set
        target: EAIV14026
        value: "none"
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV14020
