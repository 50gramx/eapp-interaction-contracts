    name-code: EIC1004
    label: Activity Summary

- name-code: EAIC11002
  name: Earned Metric
  component:
    name-code: EIC1031
    value: EAIV11005.earned_uetc
    label: Earned (μETC)
    caption: from peers
    status: positive

- name-code: EAIC11004
  name: Spent Metric
  component:
    name-code: EIC1031
    value: EAIV11005.spent_uetc
    label: Spent (μETC)
    caption: on peers
    status: negative

- name-code: EAIC11003
  name: Inferences Metric
  component:
    name-code: EIC1031
    value: EAIV11005.inferences_served
    label: Inferences served
    # NOT "owed 0.00 EC, always" any more. That caption was the old promise that
    # a gram's own inference is free — the assumption this system has dropped:
    # inference is priced whoever asked for it, and self-consumption is settled
    # by the periodic credit-back rather than by being worth nothing. This
    # counter is how MUCH work was done; what it cost is the Inference row of
    # the Activity Summary.
    caption: served on this gram's own hardware
    status: positive

- name-code: EAIC11051
  name: Summary Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC11003
      - EAIC11002
      - EAIC11004

# Per-resource TOTALS — the summary is the aggregation, one row per RESOURCE
# NETWORK ("how much of each have I used, ever"). This is distinct from the
# ledger below, which is the itemised statement of individual receipts.
# Source: epn.metering.summary's resource_summary, from GET /v1/metering
# aggregated by the daemon (payment.Summarize). All 8 networks are always
# present, even at zero — a network nobody has used yet reads "not yet
# metered", never a blank row.
- name-code: EAIC11096
  name: Resource Totals Table
  component:
    name-code: EIC1032
    source: EAIV11005.resource_summary
    columns:
      - Resource
      - Total
      - Earned
      - Spent
    fields:
      - resource
      - total
      - earned
      - spent
    empty-message: No resource networks configured on this node.

- name-code: EAIC11010
  name: Refresh Button
  component:
    name-code: EIC1008
    label: Refresh
    on-click: EALC11002

- name-code: EAIC11011
  name: Summary Divider
  component:
    name-code: EIC1025
    height: 1

- name-code: EAIC11012
  name: Summary Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC11001
      - EAIC11060
      - EAIC11051
      - EAIC11096
      - EAIC11061
      - EAIC11063
      - EAIC11062
      - EAIC11010
      - EAIC11011

# ── Ledger section: THE STATEMENT ───────────────────────────────────────────────
# A bank statement, not a summary — one row per RECEIPT, newest first, not per
# resource type. The totals live in Activity Summary (EAIC11096) above; this
# answers "what actually happened, and when", the way a bank statement lists
# transactions rather than only a balance.
#
# Source: epn.metering.summary's meter_rows, built from GET /v1/metering's
# `recent` tail (the daemon's persisted, signed receipts — payment.ReceiptStore).
# Each receipt was signed, hash-chained, and — until the store existed — kept
# only in RAM and then lost on restart; this is that evidence, finally durable
# and finally readable.
#
# Empty is a true and complete state, not an error: a node that has not yet
# lent or borrowed a cross-node resource has no statement lines, same as a bank
# account before its first transaction.

- name-code: EAIC11090
  name: Ledger Header
  component:
    name-code: EIC1004
    label: What Ran

- name-code: EAIC11091
  name: Ledger Table
  component:
    name-code: EIC1032
    source: EAIV11005.meter_rows
    columns:
      - When
      - Operator
      - What ran
      - Quantity
      - Direction
      - Value
    fields:
      - when
      - operator
      - what
      - qty
      - who
      - amt
    empty-message: Nothing metered yet — every cross-node receipt will show up here as it happens.

# EAIC11077 (Local Receipts Metric) and EAIC11078 (Local Receipt Hash Label)
# are removed. They read EAIV11005.local_inference_receipts /
# .local_inference_last_hash — a separate "local inference" receipt chain that
# no longer exists: inference this gram serves itself is now an ordinary priced
# gpu_second receipt, counted in the Inference row of the Activity Summary and
# itemised in the ledger below like every other resource. Those two fields are
# gone from the daemon, so these components would have rendered a permanent
# "0" and an empty hash under a caption promising proof — which is what they
# were already doing, for months, while the receipts they claimed to prove were
# never being written at all.

- name-code: EAIC11093
  name: Ledger Divider
  component:
    name-code: EIC1025
    height: 1

- name-code: EAIC11094
  name: Ledger Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC11090
      - EAIC11091
      - EAIC11093

