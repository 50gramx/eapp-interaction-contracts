# ── Sessions section: PER-SESSION DRILL-DOWN ────────────────────────────────
# "per resource core type one row... link to operator... per resource/operator
# to be per session ledger... live metering for sessions which are ongoing."
# The daemon's payment/statement layer keeps that granularity — a vcpu_second
# receipt and a gb_hour receipt are genuinely different resource networks,
# signed and priced separately, and stay separate records on disk and on the
# gramx. But a SESSION is one continuous run of one operator's pod touching
# several resources at once — showing three near-identical rows for one
# thing that is happening was small-record noise, not detail. This list is
# grouped back to one row per (operator, session); the resource-by-resource
# breakdown is still all there, just inside that one row's detail.
#
# Source: epn.metering.summary's `sessions`, from GET /v1/metering's `sessions`
# array (api.SessionRow — merges payment.SummarizeBySession's signed totals,
# K8sResourceMeter.Sessions()'s live state, and the StatementIndex's publish
# outcomes), grouped client-side. Reusing EIC1026 (not EIC1032): the ledger
# table has no on-row-tap (documented in EPN_DESIGN_BACKLOG.md; epn_circle's
# Roster List made the same choice for the same reason).

- name-code: EAIC11142
  name: Sessions Header
  component:
    name-code: EIC1004
    label: Sessions

- name-code: EAIC11141
  name: Sessions List
  component:
    name-code: EIC1026
    source: EAIV11005.sessions
    item-type: list-item
    title-field: title
    subtitle-field: subtitle
    trailing-text-field: trailing
    on-item-tap: EALC11003

# ── Selected Session detail card — one value + caption row per field ────────
