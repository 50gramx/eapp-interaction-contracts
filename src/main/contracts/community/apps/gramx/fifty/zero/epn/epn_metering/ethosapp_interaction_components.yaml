      - EAIC11004

# Per-resource TOTALS — the summary is the aggregation, one row per RESOURCE
# NETWORK ("how much of each have I used, ever"). This is distinct from the
# ledger below, which is the itemised statement of individual receipts.
# Source: epn.metering.summary's resource_summary, from GET /v1/metering
# aggregated by the daemon (payment.Summarize). All 8 networks are always
# present, even at zero — a network nobody has used yet reads "not yet
# metered", never a blank row.
- name-code: EAIC11096
  name: Resource Totals Table
  component:
    name-code: EIC1032
    source: EAIV11005.resource_summary
    columns:
      - Resource
      - Total
      - Earned
      - Spent
    fields:
      - resource
      - total
      - earned
      - spent
    empty-message: No resource networks configured on this node.

- name-code: EAIC11010
  name: Refresh Button
  component:
    name-code: EIC1008
    label: Refresh
    on-click: EALC11002

- name-code: EAIC11011
  name: Summary Divider
  component:
    name-code: EIC1025
    height: 1

- name-code: EAIC11012
  name: Summary Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC11001
      - EAIC11060
      - EAIC11051
      - EAIC11096
      - EAIC11061
      - EAIC11063
      - EAIC11062
      - EAIC11010
      - EAIC11011

# ── Ledger section: THE STATEMENT ───────────────────────────────────────────────
# A bank statement, not a summary — one row per RECEIPT, newest first, not per
# resource type. The totals live in Activity Summary (EAIC11096) above; this
# answers "what actually happened, and when", the way a bank statement lists
# transactions rather than only a balance.
#
# Source: epn.metering.summary's meter_rows, built from GET /v1/metering's
# `recent` tail (the daemon's persisted, signed receipts — payment.ReceiptStore).
# Each receipt was signed, hash-chained, and — until the store existed — kept
# only in RAM and then lost on restart; this is that evidence, finally durable
# and finally readable.
#
# Empty is a true and complete state, not an error: a node that has not yet
# lent or borrowed a cross-node resource has no statement lines, same as a bank
# account before its first transaction.

- name-code: EAIC11090
  name: Ledger Header
  component:
    name-code: EIC1004
    label: What Ran

- name-code: EAIC11091
  name: Ledger Table
  component:
    name-code: EIC1032
    source: EAIV11005.meter_rows
    columns:
      - When
      - What ran
      - Quantity
      - Direction
      - Value
    fields:
      - when
      - what
      - qty
      - who
      - amt
    empty-message: Nothing metered yet — every cross-node receipt will show up here as it happens.

- name-code: EAIC11077
  name: Local Receipts Metric
  component:
    name-code: EIC1031
    value: EAIV11005.local_inference_receipts
    label: Self-signed receipts
    caption: zero-price, hash-chained — accountable like any other resource
    status: positive

- name-code: EAIC11078
  name: Local Receipt Hash Label
  component:
    name-code: EIC1020
    text: EAIV11005.local_inference_last_hash
    variant: caption01
    color: on-surface-subtle
    middle-ellipsis: true
    prefix-chars: 10
    suffix-chars: 6
    code-surface: true

- name-code: EAIC11093
  name: Ledger Divider
  component:
    name-code: EIC1025
    height: 1

- name-code: EAIC11094
  name: Ledger Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC11090
      - EAIC11091
      - EAIC11077
      - EAIC11078
      - EAIC11093

