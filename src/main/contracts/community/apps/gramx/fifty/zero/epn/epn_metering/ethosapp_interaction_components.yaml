# Payment-channel detail and wallet balance are deliberately NOT duplicated
# here — they're epn_wallet's job (Balance/Channels/Open Channel/Settle
# sections already live there). The design's Metering screen has no
# channels table or balance card either; this page is the ledger + summary
# only.

# ── Spend cap reached notice ──────────────────────────────────────────────────
# WARNING: Currently shows static text. To become reactive, the daemon's
# epn.metering.summary handler must add:
#   - cap_reached: bool (computed from spent_uetc >= max_per_hour_uetc)
#   - max_per_hour_uetc: the configured spend cap (or derive from epn_settings)
# Then bind visibility to EAIV11005.cap_reached and show actual cap value.

- name-code: EAIC11063
  name: Spend Cap Reached Notice
  component:
    name-code: EIC1033
    kind: caution
    title: Spend cap reached
    body: Your hourly spend limit has been reached. New resource consumption will be blocked until the cap resets. See Settings > Spend Limits to adjust.

