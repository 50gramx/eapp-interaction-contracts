# ── Carbon Tile wrappers ────────────────────────────────────────────────────
# Every other EP&N carbon eApp (Home, Node, Peers, Circle) wraps each
# top-level section in an EIC1023 tile (layer-02) — that's what gives Carbon
# pages their flat, bordered, layered surfaces. Metering's sections had no
# tile at all (rendered as bare ungrouped EIC1005 groups). These wrap the
# existing sections without changing any of their content.

- name-code: EAIC11080
  name: Summary Tile
  component:
    name-code: EIC1023
    child: EAIC11012
    color: layer-02

- name-code: EAIC11095
  name: Ledger Tile
  component:
    name-code: EIC1023
    child: EAIC11094
    color: layer-02

- name-code: EAIC11082
