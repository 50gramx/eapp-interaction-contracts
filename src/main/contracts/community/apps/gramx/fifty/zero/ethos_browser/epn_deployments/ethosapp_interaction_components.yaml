# ── Active Deployments section ────────────────────────────────────────────────

- name-code: EAIC9001
  name: Deployments Header
  component:
    name-code: EIC1004
    label: Active Operators

- name-code: EAIC9002
  name: Deployments List
  component:
    name-code: EIC1026
    source: EAIV9001
    item-type: list-item
    title-field: name
    subtitle-field: status
    trailing-field: operator_id
    scrollable: true
    max-height: 280

- name-code: EAIC9003
  name: No Deployments Label
  component:
    name-code: EIC1020
    text: No operators installed. Use the form below to install one.
    variant: body2
    align: center
    color: 0xFF9E9E9E

- name-code: EAIC9004
  name: Deployments Divider
  component:
    name-code: EIC1025
    height: 1

- name-code: EAIC9005
  name: Deployments Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC9001
      - EAIC9002
      - EAIC9003
      - EAIC9004

