# Load all metering data on page appear, then keep the ledger live.
#
# EAIV11005's `platform-stream` (declared on the variable itself, in
# ethosapp_local_variables.yaml) makes VariableManager auto-subscribe it to
# epn.metering.stream as soon as the variable is registered — that is the
# ONLY subscribe mechanism used here. A `platform-subscribe` step used to sit
# here too, but that command (PlatformSubscribeCommandProcessor) always wraps
# each emission as `[data]` — correct for the List-shaped streams it was
# built for, wrong for this Map-shaped summary, and it was silently breaking
# every dot-access binding (EAIV11005.sessions, .earned_uetc, ...) on every
# tick. The one-shot invoke below still runs on page appear so the page has
# real data before the first stream tick, rather than an empty state.
- name-code: EALC11001
  name: Init Page
  context:
    steps:
      - command: platform-invoke
        handler: epn.wallet.balance
        assign-to: EAIV11001
      - command: platform-invoke
        handler: epn.wallet.channels
        assign-to: EAIV11002
      - command: platform-invoke
        handler: epn.node.resources
        assign-to: EAIV11004
      - command: platform-invoke
        handler: epn.metering.summary
        assign-to: EAIV11005

# Refresh all metering data.
- name-code: EALC11002
  name: Refresh
  context:
    steps:
      - command: platform-invoke
        handler: epn.wallet.balance
        assign-to: EAIV11001
      - command: platform-invoke
        handler: epn.wallet.channels
        assign-to: EAIV11002
      - command: platform-invoke
        handler: epn.metering.summary
        assign-to: EAIV11005

# Copy one tapped Sessions-list row (EAIC11141) into the page-level "Selected
# Session" variables, so the detail card can show the full record — operator,
# deployment, pod, and the per-resource breakdown — with zero extra
# round-trips. The row is already grouped (one per operator/session, not per
# resource type), so a single `set` per field is enough.
- name-code: EALC11003
  name: Select Session
  context:
    expects:
      - session_id: ELVT1007
      - operator_id: ELVT1007
      - deployment_id: ELVT1007
      - pod_name: ELVT1007
      - receipts: ELVT1006
      - amount_uetc: ELVT1006
      - when: ELVT1007
      - status: ELVT1007
      - resources: ELVT1007
      - publish_status: ELVT1007
      - replica_peers: ELVT1007
    steps:
      - command: set
        target: EAIV11010
        value: session_id
      - command: set
        target: EAIV11011
        value: operator_id
      - command: set
        target: EAIV11012
        value: deployment_id
      - command: set
        target: EAIV11013
        value: pod_name
      - command: set
        target: EAIV11014
        value: receipts
      - command: set
        target: EAIV11015
        value: amount_uetc
      - command: set
        target: EAIV11016
        value: when
      - command: set
        target: EAIV11017
        value: status
      - command: set
        target: EAIV11018
        value: resources
      - command: set
        target: EAIV11019
        value: publish_status
      - command: set
        target: EAIV11020
        value: replica_peers
      - command: set
        target: EAIV11021
        value: "selected"
