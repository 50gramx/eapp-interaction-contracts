# Load Circle status on page appear and derive the initial wizard state from
# it, so reopening the app lands on the right tile instead of always "off".
- name-code: EALC15001
  name: Init Page
  context:
    steps:
      - command: platform-invoke
        handler: epn.circle.status
        assign-to: EAIV15001
      - command: get-map-value
        target-map: EAIV15001
        key: enabled
        assign-to: EAIV15013
      - command: get-map-value
        target-map: EAIV15001
        key: members
        assign-to: EAIV15011
      - command: get-map-value
        target-map: EAIV15001
        key: member_count
        assign-to: EAIV15012
      - command: if
        condition:
          - EAIV15013
          - equals
          - true
        then:
          - command: if
            condition:
              - EAIV15012
              - greater-than
              - 0
            then:
              - command: set
                target: EAIV15002
                value: "active"
            else:
              - command: set
                target: EAIV15002
                value: "setup"
        else:
          - command: set
            target: EAIV15002
            value: "off"
      # SA-RING-RECIPROCITY-GAP: load the most recent "you were added" notice
      # and derive whether the banner tile shows, regardless of wizard state.
      - command: platform-invoke
        handler: epn.circle.notifications.latest
        assign-to: EAIV15018
      - command: get-map-value
        target-map: EAIV15018
        key: has_notification
        assign-to: EAIV15020
      - command: if
        condition:
          - EAIV15020
          - equals
          - true
        then:
          - command: set
            target: EAIV15019
            value: "show"
        else:
          - command: set
            target: EAIV15019
            value: "hide"

# "Start a Circle" — enables the trusted ring on the daemon (still empty —
# this device only) and moves to Setup so the operator can add the first
# member. Assumes daemon endpoint epn.circle.enable exists — see report.
- name-code: EALC15002
  name: Start Circle
  context:
    steps:
      - command: platform-invoke
        handler: epn.circle.enable
        assign-to: EAIV15014
      - command: platform-invoke
        handler: epn.circle.status
        assign-to: EAIV15001
      - command: set
        target: EAIV15002
        value: "setup"

# Return the paste-a-DID TextEditingController.
- name-code: EALC15003
  name: Get Add DID Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV15004

# Enter the Adding tile from Setup (first member) — return state is "setup".
- name-code: EALC15004
  name: Begin Add Member From Setup
  context:
    steps:
      - command: set
        target: EAIV15003
        value: "setup"
      - command: set
        target: EAIV15002
        value: "adding"
      - command: set
        target: EAIV15005
        value: ""

# Enter the Adding tile from the Active roster (additional member) — return
# state is "active".
- name-code: EALC15012
  name: Begin Add Member From Active
  context:
    steps:
      - command: set
        target: EAIV15003
        value: "active"
      - command: set
        target: EAIV15002
        value: "adding"
      - command: set
        target: EAIV15005
        value: ""

# Submit the pasted DID as a member. No local format check — confirmed live
# (2026-06-21) that string-substring on EAIV15004 (a TextEditingController/
# ELVT1001, not a plain string) does not do what it looks like it does: the
# one real string-substring precedent in this repo (the calculator eApp)
# only ever operates on a plain ELVT1007 string, never a controller. Rather
# than chase a second unproven workaround, this follows the KYC email flow's
# own precedent exactly (EALC12024 in epn_settings): no client-side
# validation at all, pass the controller straight through, and surface
# whatever epn.circle.add's real server-side check returns via {error: "..."}.
#
# role is a literal here, not a variable — SA-RBAC-3's two add buttons each
# call their own capability with a fixed role rather than sharing one
# capability plus a role-selector variable, since that would need an extra
# state variable for no real benefit (two buttons that always mean the same
# thing are simpler than one button whose meaning depends on a side state).
- name-code: EALC15005
  name: Submit Add Member As Member
  context:
    steps:
      - command: platform-invoke
        handler: epn.circle.add
        params:
          did: EAIV15004
          role: "member"
        assign-to: EAIV15007
      - command: get-map-value
        target-map: EAIV15007
        key: error
        assign-to: EAIV15005
      - command: if
        condition:
          - EAIV15005
          - equals
          - ""
        then:
          - command: platform-invoke
            handler: epn.circle.status
            assign-to: EAIV15001
          - command: get-map-value
            target-map: EAIV15001
            key: members
            assign-to: EAIV15011
          - command: get-map-value
            target-map: EAIV15001
            key: member_count
            assign-to: EAIV15012
          - command: set
            target: EAIV15002
            value: "active"

# Same as EALC15005, but adds as admin (SA-RBAC-3: admin-role members may use
# this device's GPU; plain members may not).
- name-code: EALC15016
  name: Submit Add Member As Admin
  context:
    steps:
      - command: platform-invoke
        handler: epn.circle.add
        params:
          did: EAIV15004
          role: "admin"
        assign-to: EAIV15007
      - command: get-map-value
        target-map: EAIV15007
        key: error
        assign-to: EAIV15005
      - command: if
        condition:
          - EAIV15005
          - equals
          - ""
        then:
          - command: platform-invoke
            handler: epn.circle.status
            assign-to: EAIV15001
          - command: get-map-value
            target-map: EAIV15001
            key: members
            assign-to: EAIV15011
          - command: get-map-value
            target-map: EAIV15001
            key: member_count
            assign-to: EAIV15012
          - command: set
            target: EAIV15002
            value: "active"

# Cancel out of Adding back to wherever we came from.
- name-code: EALC15006
  name: Cancel Add Member
  context:
    steps:
      - command: set
        target: EAIV15002
        value: EAIV15003
      - command: set
        target: EAIV15005
        value: ""

# Tap a roster row — select it for removal (mirrors epn_node's select-then-act
# pattern, not tap-to-immediately-delete).
- name-code: EALC15007
  name: Select Member
  context:
    expects:
      - did: ELVT1007
      - label: ELVT1007
    steps:
      - command: set
        target: EAIV15008
        value: did
      - command: set
        target: EAIV15009
        value: label
      - command: set
        target: EAIV15015
        value: "selected"

# Remove the selected member, then refresh the roster and clear selection.
# Drops back to "setup" if that was the last member.
- name-code: EALC15008
  name: Remove Selected Member
  context:
    steps:
      - command: platform-invoke
        handler: epn.circle.remove
        params:
          did: EAIV15008
        assign-to: EAIV15010
      - command: platform-invoke
        handler: epn.circle.status
        assign-to: EAIV15001
      - command: get-map-value
        target-map: EAIV15001
        key: members
        assign-to: EAIV15011
      - command: get-map-value
        target-map: EAIV15001
        key: member_count
        assign-to: EAIV15012
      - command: set
        target: EAIV15008
        value: ""
      - command: set
        target: EAIV15009
        value: ""
      - command: set
        target: EAIV15015
        value: "none"
      - command: if
        condition:
          - EAIV15012
          - equals
          - 0
        then:
          - command: set
            target: EAIV15002
            value: "setup"

# Turn off the Circle entirely — reopens this device to the full open mesh.
- name-code: EALC15009
  name: Turn Off Circle
  context:
    steps:
      - command: platform-invoke
        handler: epn.circle.disable
        assign-to: EAIV15014
      - command: set
        target: EAIV15002
        value: "off"
      - command: set
        target: EAIV15008
        value: ""
      - command: set
        target: EAIV15009
        value: ""
      - command: set
        target: EAIV15015
        value: "none"

# Copy this device's own DID to the clipboard. clipboard.copy can't take a
# dotted path ("EAIV15001.own_did") as a param value the way EIC1020 text
# can, so the value is extracted into a plain string first.
- name-code: EALC15013
  name: Copy Own DID
  context:
    steps:
      - command: get-map-value
        target-map: EAIV15001
        key: own_did
        assign-to: EAIV15016
      - command: platform-invoke
        handler: clipboard.copy
        params:
          text: EAIV15016
        assign-to: EAIV15017

# Dismiss the reciprocity-gap banner (SA-RING-RECIPROCITY-GAP). Same
# dotted-path extraction reasoning as Copy Own DID above.
- name-code: EALC15015
  name: Dismiss Notice
  context:
    steps:
      - command: get-map-value
        target-map: EAIV15018
        key: from_did
        assign-to: EAIV15021
      - command: platform-invoke
        handler: epn.circle.notifications.dismiss
        params:
          from_did: EAIV15021
        assign-to: EAIV15023
      - command: set
        target: EAIV15019
        value: "hide"
