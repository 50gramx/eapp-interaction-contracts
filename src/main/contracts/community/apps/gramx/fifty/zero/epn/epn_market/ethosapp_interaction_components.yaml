  component:
    name-code: EIC1020
    text: EAIV13008.node_did
    variant: caption01
    color: on-surface-subtle

- name-code: EAIC13027
  name: Selected Price Label
  component:
    name-code: EIC1020
    text: EAIV13008.price_utc
    variant: caption01
    color: primary

- name-code: EAIC13028
  name: Bid Capacity Input
  component:
    name-code: EIC1009
    hint-text: Requested capacity
    text-controller: EALC13009

- name-code: EAIC13029
  name: Bid Max Price Input
  component:
    name-code: EIC1009
    hint-text: Max price per unit (uETC)
    text-controller: EALC13010

- name-code: EAIC13030
