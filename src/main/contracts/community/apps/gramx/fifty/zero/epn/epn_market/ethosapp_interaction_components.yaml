# ── Browse offers section ───────────────────────────────────────────────────

- name-code: EAIC13001
  name: Browse Header
  component:
    name-code: EIC1004
    label: Resource Market

- name-code: EAIC13002
  name: Filter Input
  component:
    name-code: EIC1009
    hint-text: "Filter: gpu_second, vcpu_second, gb_hour, gb_month, egress_gb, relay_second, kwh, all"
    text-controller: EALC13002

- name-code: EAIC13003
  name: Apply Filter Button
  component:
    name-code: EIC1006
    label: Apply Filter
    on-click: EALC13003

- name-code: EAIC13040
  name: Min Price Metric
  component:
    name-code: EIC1031
    value: EAIV13003.min_price_utc
    label: Min price
    caption: uETC/unit

- name-code: EAIC13041
  name: Avg Price Metric
  component:
    name-code: EIC1031
    value: EAIV13003.avg_price_utc
    label: Avg price
    caption: uETC/unit

- name-code: EAIC13042
  name: Max Price Metric
  component:
    name-code: EIC1031
    value: EAIV13003.max_price_utc
    label: Max price
    caption: uETC/unit

- name-code: EAIC13043
  name: Offer Count Metric
  component:
    name-code: EIC1031
    value: EAIV13003.offer_count
    label: Offers
    caption: matching filter
    status: primary

- name-code: EAIC13012
  name: Offers List
  component:
    name-code: EIC1026
    source: EAIV13001
    item-type: list-item
    title-field: resource_label
    subtitle-field: node_did
    trailing-field: price_utc
    on-item-tap: EALC13008
    scrollable: true
    max-height: 240

- name-code: EAIC13013
  name: No Offers Label
  component:
    name-code: EIC1020
    text: No offers posted yet. Be the first to post one below.
    variant: body01
    align: center
    color: on-surface-subtle

- name-code: EAIC13014
  name: Filter Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC13002
      - EAIC13003

- name-code: EAIC13015
  name: Price Summary Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC13040
      - EAIC13041

- name-code: EAIC13016
  name: Offer Count Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC13042
      - EAIC13043

# ── Post offer section ───────────────────────────────────────────────────────

- name-code: EAIC13017
  name: Post Header
  component:
    name-code: EIC1004
    label: Post an Offer

- name-code: EAIC13018
  name: Post Resource Type Input
  component:
    name-code: EIC1009
    hint-text: "Resource type: gpu_second, vcpu_second, gb_hour, gb_month, egress_gb, relay_second, kwh"
    text-controller: EALC13004

- name-code: EAIC13019
  name: Post Capacity Input
  component:
    name-code: EIC1009
    hint-text: Capacity available (units depend on resource type)
    text-controller: EALC13005

- name-code: EAIC13020
  name: Post Price Input
  component:
    name-code: EIC1009
    hint-text: Price per unit (uETC)
    text-controller: EALC13006

- name-code: EAIC13021
  name: Post Offer Button
  component:
    name-code: EIC1006
    label: Post Offer
    on-click: EALC13007

- name-code: EAIC13022
  name: Post Result Label
  component:
    name-code: EIC1020
    text: EAIV13007.id
    variant: caption01
    color: positive

- name-code: EAIC13023
  name: Post Result Error Label
  component:
    name-code: EIC1020
    text: EAIV13007.error
    variant: caption01
    color: negative

# ── Rent (place bid) section ─────────────────────────────────────────────────

- name-code: EAIC13024
  name: Rent Header
  component:
    name-code: EIC1004
    label: Rent Selected Offer

- name-code: EAIC13025
  name: Selected Resource Label
  component:
    name-code: EIC1020
