    text-controller: EALC13010

- name-code: EAIC13030
  name: Bid Duration Input
  component:
    name-code: EIC1009
    hint-text: Duration (seconds)
    text-controller: EALC13011

- name-code: EAIC13031
  name: Place Bid Button
  component:
    name-code: EIC1006
    label: Rent This
    on-click: EALC13012

- name-code: EAIC13032
  name: Bid Result Label
  component:
    name-code: EIC1020
    text: EAIV13012.match_id
