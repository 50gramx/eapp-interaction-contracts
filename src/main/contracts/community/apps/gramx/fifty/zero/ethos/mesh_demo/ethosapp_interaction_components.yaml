# Protobuf scalar coverage card.
- name-code: EAIC8001
  name: Scalar Coverage Card
  component:
    name-code: EIC1023
    title: Protobuf Scalar Coverage
    children-components:
      - EAIC8002
      - EAIC8003
      - EAIC8004
      - EAIC8005
      - EAIC8006
      - EAIC8007
      - EAIC8008

- name-code: EAIC8002
  name: Scalar Coverage Text
  component:
    name-code: EIC1020
    text: Supported basic scalars in ELVT are string, int64, double, float, bool, bytes, enum, and map support via ELVT1019.
    variant: body01

- name-code: EAIC8003
  name: Missing Scalar Text
  component:
    name-code: EIC1020
    text: Missing scalar variants are int32, uint32, uint64, sint32, sint64, fixed32, fixed64, sfixed32, and sfixed64.
    variant: body01

- name-code: EAIC8004
  name: Oneof Text
  component:
    name-code: EIC1020
    text: oneof is not a first-class ELVT type, so it must be modeled as nullable sibling fields or a tagged union pattern.
    variant: body01

- name-code: EAIC8005
  name: WKT Coverage Text
  component:
    name-code: EIC1020
    text: Supported WKT-style demo fields cover Timestamp, Duration, Any, Struct, Value/ListValue via map/list shapes, Empty, and FieldMask.
    variant: body01

- name-code: EAIC8006
  name: App-Primitives Text
  component:
    name-code: EIC1020
    text: The demo also shows the app-level primitives usually needed to ship a real app: text controllers, URL/URI, UUID, color, email, phone, currency, and geo.
    variant: body01

- name-code: EAIC8007
  name: Demo Data Text
  component:
    name-code: EIC1020
    text: Open the profile entity below to inspect the concrete field defaults used by the demo.
    variant: body02

