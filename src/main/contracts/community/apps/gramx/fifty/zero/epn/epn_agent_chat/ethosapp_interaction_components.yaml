# ── Message list ──────────────────────────────────────────────────────────────

# Reactive list — updated on every send. role field (You / Evo / error)
# shows as the sender label. Human items stay {role, text}; AI turns carry
# the evolved {role, text, ai, persona_id, locality, grounding, activity,
# evidence, errors} shape -- see EAIV6002 for the full shape and the
# Carbon-for-AI chrome (_CarbonChatBubble in eapp-jittery-modelled) it
# drives: AI label, locality/grounding tags, work-summary, and the "Why
# this answer?" explainability disclosure.
- name-code: EAIC6002
  name: Messages List
  component:
    name-code: EIC1026
    source: EAIV6002
    item-type: chat-message
    text-field: eamvt6008
    sender-field: eamvt6004
    ai-field: eamvt6009
    persona-id-field: eamvt6010
    locality-field: eamvt6011
    grounding-field: eamvt6012
    activity-field: eamvt6013
    evidence-field: eamvt6014
    errors-field: eamvt6015
    self-sender-values:
      - You
    error-sender-values:
      - error
    show-sender-label: true
    show-avatar: true
    scrollable: true
    max-height: 440

# Animated "thinking" indicator — a transient typing-dots bubble shown only
# while a turn is in flight. Sourced from EAIV6029 (the pending-turn list,
# populated by EALC6002 around the unary mesh invoke). `thinking-field` makes
# the chat-message renderer draw the animated dots instead of a text bubble;
# `hide-empty` keeps it invisible when no turn is pending.
- name-code: EAIC6040
  name: Thinking Indicator
  component:
    name-code: EIC1026
    source: EAIV6029
    item-type: chat-message
    thinking-field: thinking
    sender-field: eamvt6004
    hide-empty: true
    show-sender-label: false
    show-avatar: true

# Empty state — shown when EAIV6002 is empty.
- name-code: EAIC6003
  name: Empty State Label
  component:
    name-code: EIC1020
    text: Ask Evo anything about your node — deployments, status, costs.
    variant: body01
    align: center
    color: on-surface-subtle

