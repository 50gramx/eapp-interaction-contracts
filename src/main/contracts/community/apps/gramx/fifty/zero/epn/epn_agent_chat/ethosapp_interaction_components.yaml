# ── Approval (reused inside the footer -- see "Composer / footer states"
# below). No longer rendered near the header: that was a second, independently
# stale copy of the same approve/deny action shown here AND inline in the
# transcript AND in the footer -- three places for one irreversible decision.
# The footer is now the only interactive location.

- name-code: EAIC6017
  name: Latest Approval
  component:
    name-code: EIC1020
    text: EAIV6017.summary
    variant: caption01
    color: on-surface-subtle

- name-code: EAIC6018
  name: Approve Approval Button
  component:
    name-code: EIC1006
    label: Approve
    on-click: EALC6018

- name-code: EAIC6019
  name: Deny Approval Button
  component:
    name-code: EIC1008
    label: Deny
    on-click: EALC6019

- name-code: EAIC6022
  name: Approval Buttons Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC6018
      - EAIC6019

# ── Message list ──────────────────────────────────────────────────────────────

# Reactive list — updated on every send. role field (You / Evo / error)
# shows as the sender label. Human items stay {role, text}; AI turns carry
# the evolved {role, text, ai, persona_id, locality, grounding, activity,
# evidence, errors} shape -- see EAIV6002 for the full shape and the
# Carbon-for-AI chrome (_CarbonChatBubble in eapp-jittery-modelled) it
# drives: AI label, locality/grounding tags, work-summary, and the "Why
# this answer?" explainability disclosure.
#
# Renders as a plain flowing list (no `scrollable`/`max-height`): the page
# has exactly one scroll region (the outer page scroll), not a page scroll
# plus an independently-scrolling boxed transcript.
#
# No kind/target/risk/approve/deny wiring here anymore — the interactive
# approve/deny card lives ONLY in the footer (see EAIC6044 below); a past
# approval turn shows as Evo's own plain-text message, same as any other
# turn, instead of a second live-looking action card.
- name-code: EAIC6002
  name: Messages List
  component:
    name-code: EIC1026
    source: EAIV6002
    item-type: chat-message
    text-field: eamvt6008
    sender-field: eamvt6004
    ai-field: eamvt6009
    persona-id-field: eamvt6010
    locality-field: eamvt6011
    grounding-field: eamvt6012
    activity-field: eamvt6013
    evidence-field: eamvt6014
    errors-field: eamvt6015
    self-sender-values:
      - You
    error-sender-values:
      - error
    show-sender-label: true
    show-avatar: true

# Animated "thinking" indicator — a transient typing-dots bubble shown only
# while a turn is in flight. Sourced from EAIV6029 (the pending-turn list,
# populated by EALC6002 around the unary mesh invoke). `thinking-field` makes
# the chat-message renderer draw the animated dots instead of a text bubble;
# `hide-empty` keeps it invisible when no turn is pending.
- name-code: EAIC6040
  name: Thinking Indicator
  component:
    name-code: EIC1026
    source: EAIV6029
    item-type: chat-message
    thinking-field: thinking
    sender-field: eamvt6004
    hide-empty: true
    show-sender-label: false
    show-avatar: true

# Empty state — shown when EAIV6002 is empty.
- name-code: EAIC6003
  name: Empty State Label
  component:
    name-code: EIC1020
    text: Ask Evo anything about your node — deployments, status, costs.
    variant: body01
    align: center
    color: on-surface-subtle

# ── Composer / footer states ─────────────────────────────────────────────────
# The footer is a single action surface that shows exactly ONE of three
# things at a time, matched on state (EIC1036), never stacked:
#   1. pending approval  -> approve/deny card (EAIC6044)
#   2. workflows view open -> a single "Back to chat" control (EAIC6048)
#   3. otherwise (normal chat) -> divider + input + action row (EAIC6045)
# This mirrors Carbon AI Chat's own pattern: the footer/input area and any
# blocking action share one anchored slot, and a secondary list (their
# custom-panel concept) replaces the main view rather than living inline.

- name-code: EAIC6004
  name: Input Field
  component:
    name-code: EIC1009
    hint-text: Ask Evo anything…
    text-bind: EAIV6005
    # Pressing Enter submits the message (same as the Send button → EALC6002).
    on-submit: EALC6002

- name-code: EAIC6005
  name: Send Button
  component:
    name-code: EIC1006
    label: Send
    on-click: EALC6002

- name-code: EAIC6033
  name: Check Readiness Button
  component:
    name-code: EIC1006
    label: Check readiness
    on-click: EALC6020

- name-code: EAIC6034
  name: Run Ready Checks Button
  component:
    name-code: EIC1006
    label: Run ready checks
    on-click: EALC6021

- name-code: EAIC6035
  name: Run Ready Checks Match
  component:
    name-code: EIC1036
    source: EAIV6016.has_supported_ready_checks
    cases:
      true: EAIC6034
    default: EAIC6036

- name-code: EAIC6036
  name: Run Ready Checks Hidden
  component:
    name-code: EIC1025
    height: 0

- name-code: EAIC6037
  name: Readiness Progress Label
  component:
    name-code: EIC1020
    text: Live readiness progress
    variant: caption01
    color: on-surface-subtle

- name-code: EAIC6038
  name: Readiness Progress Feed
  component:
    name-code: EIC1026
    source: EAIV6018
    item-type: chat-message
    text-field: text
    sender-field: role
    self-sender-values:
      - You
    error-sender-values:
      - error
    show-sender-label: true
    show-avatar: false
    scrollable: true
    max-height: 220

# ── Divider ───────────────────────────────────────────────────────────────────

- name-code: EAIC6006
  name: Divider
  component:
    name-code: EIC1025
    height: 1

# ── New chat button ───────────────────────────────────────────────────────────
# Starts a fresh conversation (non-destructive; prior chats are preserved on
# disk). Wired to EALC6003 (New Chat) → epn.agent.chat.new.
# NOTE: must be defined before Action Row (EAIC6007) below -- UIComponentManager's
# componentResolver only finds a sibling in its in-progress local map if that
# sibling was already processed earlier in file order; a forward reference
# silently falls back to the (not-yet-populated) global cache and renders as
# an empty SizedBox. Keep every children-components target defined above its
# parent in this file.

- name-code: EAIC6008
  name: New Chat Button
  component:
    name-code: EIC1008
    label: New chat
    on-click: EALC6003

# Opens the workflows panel (replaces the transcript view; see EAIC6047 /
# EAIC6051 below) — the footer-triggered overlay-style panel, matching
# Carbon AI Chat's custom-panel pattern instead of an inline second scroll box.
- name-code: EAIC6050
  name: Workflows Button
  component:
    name-code: EIC1008
    label: Workflows
    on-click: EALC6024

# ── Action row: Send + New chat + Workflows ──────────────────────────────────

- name-code: EAIC6007
  name: Action Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC6005
      - EAIC6008
      - EAIC6050

# ── Persona picker: REMOVED ──────────────────────────────────────────────────
# Per the EP&N agent boundary model, the user talks to Evo only; Evo silently
# consults specialists via consult_deployment_agent and synthesizes the
# answer. A direct persona picker let the user bypass Evo and chat straight
# to a specialist's own agent loop, which contradicts that model. Fixed to
# Evo-only (see EALC6015's now-static EAIV6014 assignment).

# ── Workflows / Jobs board ────────────────────────────────────────────────────
# Every durable run with its state (Ongoing / Awaiting approval / Completed /
# Failed / Cancelled / Pending), newest first. Sourced from EAIV6031
# (epn.agent.run.list), refreshed on page open, on opening the panel, and
# after approve/deny. Lives in its own panel (EAIC6051) that replaces the
# transcript view rather than stacking a second independently-scrollable list
# above the chat — see EAIC6047 (Main Content Match).
- name-code: EAIC6042
  name: Workflows Header
  component:
    name-code: EIC1020
    text: Workflows & jobs · tap a run to dismiss
    variant: caption01
    color: on-surface-subtle

# on-item-tap dismisses the tapped run (EALC6023 → epn.agent.run.dismiss with the
# row's id). This lets the user clear a stuck pending/running "ghost" run that was
# interrupted and never resumes — the reconcile requeue leaves such runs on the
# board, and "Clear finished" only removes terminal ones.
#
# Renders as a plain flowing list (no `scrollable`/`max-height`) since it now
# lives alone in its own panel view (EAIC6051), not nested inside the chat
# transcript's scroll region.
- name-code: EAIC6041
  name: Workflows List
  component:
    name-code: EIC1026
    source: EAIV6031
    item-type: list-item
    title-field: title
    subtitle-field: subtitle
    on-item-tap: EALC6023

- name-code: EAIC6043
  name: Clear Finished Button
  component:
    name-code: EIC1008
    label: Clear finished
    on-click: EALC6022

# ── Design framing: LEVEL chip + local-first cue ──────────────────────────────
# Moved above EAIC6009 (which references both): componentResolver only finds
# a children-components sibling if it was already processed earlier in file
# order (see the New Chat Button note above) -- these were defined AFTER
# EAIC6009 before, so they silently rendered as empty SizedBoxes the whole
# time. Fixed by definition order, not a component change.

- name-code: EAIC6020
  name: Language Chip
  component:
    name-code: EIC1030
    label: LEVEL · personal
    status: neutral

- name-code: EAIC6021
  name: Local First Cue
  component:
    name-code: EIC1020
    text: Evo and its specialist agents run locally. Cloud model escalation is disabled.
    variant: caption01
    color: on-surface-subtle

# ── Layout columns ────────────────────────────────────────────────────────────

# The chat transcript view: header + framing chips + messages. No workflows,
# no approval card — those live in the footer / workflows panel respectively.
- name-code: EAIC6009
  name: Chat History Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC6001
      - EAIC6020
      - EAIC6021
      - EAIC6003
      - EAIC6002
      - EAIC6040

# The workflows panel view: replaces the transcript entirely while open
# (Carbon AI Chat's custom-panel pattern) instead of living inline above it.
- name-code: EAIC6051
  name: Workflows Panel Content
  component:
    name-code: EIC1005
    children-components:
      - EAIC6042
      - EAIC6041
      - EAIC6043

# Main content match: exactly one of {chat transcript, workflows panel} is
# visible at a time, keyed off EAIV6046 (view mode). No second scroll region
# ever competes with the other.
- name-code: EAIC6047
  name: Main Content Match
  component:
    name-code: EIC1036
    source: EAIV6046
    cases:
      workflows: EAIC6051
    default: EAIC6009

# Normal composer content (divider + input + action row) — the footer's
# default state when there's no pending approval and the workflows panel
# isn't open.
- name-code: EAIC6045
  name: Normal Composer Content
  component:
    name-code: EIC1005
    children-components:
      - EAIC6006
      - EAIC6004
      - EAIC6007

# Shown in the footer instead of the composer while the workflows panel is
# open — you can't compose a chat message and browse the workflows board at
# the same time, so the footer's only control is getting back to chat.
- name-code: EAIC6048
  name: Back To Chat Button
  component:
    name-code: EIC1006
    label: ← Back to chat
    on-click: EALC6025

# Footer view match (view-mode layer): workflows open -> Back button;
# otherwise -> the normal composer.
- name-code: EAIC6046
  name: Composer View Match
  component:
    name-code: EIC1036
    source: EAIV6046
    cases:
      workflows: EAIC6048
    default: EAIC6045

# Shown in the footer instead of anything else while an approval is pending
# — the single interactive approve/deny surface (see header note above).
- name-code: EAIC6044
  name: Approval Footer Content
  component:
    name-code: EIC1005
    children-components:
      - EAIC6017
      - EAIC6022

# Footer state match (approval layer, outermost): a pending approval always
# wins over the workflows/chat view match beneath it.
- name-code: EAIC6010
  name: Composer Section
  component:
    name-code: EIC1036
    source: EAIV6017.status
    cases:
      pending: EAIC6044
    default: EAIC6046

# ── Carbon Tile wrappers ────────────────────────────────────────────────────
# Matches Home/Node/Peers/Circle: history and composer each sit in an EIC1023
# tile (layer-02). The chat bubble itself (EIC1026 item-type: chat-message)
# is now Carbon-owned (_CarbonChatBubble, including the Aha 3 AI chrome) --
# see docs/CARBON_JITTERY_CONFORMANCE_MAP.md.

- name-code: EAIC6030
  name: Chat History Tile
  component:
    name-code: EIC1023
    child: EAIC6047
    color: layer-02

- name-code: EAIC6031
  name: Composer Tile
  component:
    name-code: EIC1023
    child: EAIC6010
    color: layer-02
