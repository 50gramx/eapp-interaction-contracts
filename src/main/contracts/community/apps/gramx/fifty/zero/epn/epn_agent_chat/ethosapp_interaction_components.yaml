# is now Carbon-owned (_CarbonChatBubble, including the Aha 3 AI chrome) --
# see docs/CARBON_JITTERY_CONFORMANCE_MAP.md.

- name-code: EAIC6030
  name: Chat History Tile
  component:
    name-code: EIC1023
