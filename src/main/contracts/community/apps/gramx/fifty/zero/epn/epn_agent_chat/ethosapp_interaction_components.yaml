# ── Header ────────────────────────────────────────────────────────────────────

- name-code: EAIC6001
  name: Evo Header
  component:
    name-code: EIC1004
    label: Evo — EP&N Concierge

- name-code: EAIC6016
  name: Latest Durable Run
  component:
    name-code: EIC1020
    text: EAIV6016.summary
    variant: caption01
    color: on-surface-subtle

- name-code: EAIC6017
  name: Latest Approval
  component:
    name-code: EIC1020
    text: EAIV6017.summary
    variant: caption01
    color: on-surface-subtle

# ── Message list ──────────────────────────────────────────────────────────────

# Reactive list — updated on every send. role field (You / Evo / error)
# shows as the sender label. Human items stay {role, text}; AI turns carry
# the evolved {role, text, ai, persona_id, locality, grounding, activity,
# evidence, errors} shape -- see EAIV6002 for the full shape and the
# Carbon-for-AI chrome (_CarbonChatBubble in eapp-jittery-modelled) it
# drives: AI label, locality/grounding tags, work-summary, and the "Why
# this answer?" explainability disclosure.
- name-code: EAIC6002
  name: Messages List
  component:
    name-code: EIC1026
    source: EAIV6002
    item-type: chat-message
    text-field: text
    sender-field: role
    self-sender-values:
      - You
    error-sender-values:
      - error
    show-sender-label: true
    show-avatar: true
    scrollable: true
    max-height: 440

# Empty state — shown when EAIV6002 is empty.
- name-code: EAIC6003
  name: Empty State Label
  component:
    name-code: EIC1020
    text: Ask Evo anything about your node — deployments, status, costs.
    variant: body01
    align: center
    color: on-surface-subtle

# ── Composer ──────────────────────────────────────────────────────────────────

- name-code: EAIC6004
  name: Input Field
  component:
    name-code: EIC1009
    hint-text: Ask Evo anything…
    text-controller: EALC6001
    on-change: EALC6004

- name-code: EAIC6005
  name: Send Button
  component:
    name-code: EIC1006
    label: Send
    on-click: EALC6002

# ── Divider ───────────────────────────────────────────────────────────────────

- name-code: EAIC6006
  name: Divider
  component:
    name-code: EIC1025
    height: 1

# ── Action row: Send + Clear ──────────────────────────────────────────────────

- name-code: EAIC6007
  name: Action Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC6005
      - EAIC6008

# ── Clear button ──────────────────────────────────────────────────────────────

- name-code: EAIC6008
  name: Clear Button
  component:
    name-code: EIC1008
    label: Clear
    on-click: EALC6003

# ── Persona picker ────────────────────────────────────────────────────────────
# Aha 3 (ideal acceptance): personas are discovered live from the daemon
# (EAIV6015, populated by EALC6015 on-appear) instead of hardcoded
# Evo/Sigma/Lume buttons -- new specialist personas (Pi, Mu, Rho, Nova,
# Eta, Stigma, Tau, ...) appear automatically as their operators register,
# with no contract change. EIC1026's own empty-state ("Nothing here yet")
# covers the daemon-offline / not-yet-probed case -- no separate fallback
# row, so there is exactly one picker, never a duplicate/stale one.

- name-code: EAIC6014
  name: Persona Picker Row
  component:
    name-code: EIC1026
    source: EAIV6015
    item-type: list-item
    title-field: name
    subtitle-field: role
    on-item-tap: EALC6016
    scrollable: true
    max-height: 96

# ── Layout columns ────────────────────────────────────────────────────────────

- name-code: EAIC6009
  name: Chat History Section
  component:
    name-code: EIC1005
