# ── New chat button ───────────────────────────────────────────────────────────
# Starts a fresh conversation (non-destructive; prior chats are preserved on
# disk). Wired to EALC6003 (New Chat) → epn.agent.chat.new.
# NOTE: must be defined before Action Row (EAIC6007) below -- UIComponentManager's
# componentResolver only finds a sibling in its in-progress local map if that
# sibling was already processed earlier in file order; a forward reference
# silently falls back to the (not-yet-populated) global cache and renders as
# an empty SizedBox. Keep every children-components target defined above its
# parent in this file.

- name-code: EAIC6008
  name: New Chat Button
  component:
    name-code: EIC1008
    label: New chat
    on-click: EALC6003

# ── Action row: Send + New chat ───────────────────────────────────────────────

- name-code: EAIC6007
  name: Action Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC6005
      - EAIC6008

# ── Persona picker ────────────────────────────────────────────────────────────
# Aha 3 (ideal acceptance): personas are discovered live from the daemon
# (EAIV6015, populated by EALC6015 on-appear) instead of hardcoded
# Evo/Sigma/Lume buttons -- new specialist personas (Pi, Mu, Rho, Nova,
# Eta, Stigma, Tau, ...) appear automatically as their operators register,
# with no contract change. EIC1026's own empty-state ("Nothing here yet")
# covers the daemon-offline / not-yet-probed case -- no separate fallback
# row, so there is exactly one picker, never a duplicate/stale one.

- name-code: EAIC6014
  name: Persona Picker Row
  component:
    name-code: EIC1026
    source: EAIV6015
    item-type: list-item
    title-field: name
    subtitle-field: role
    on-item-tap: EALC6016
    scrollable: true
    max-height: 96

# ── Workflows / Jobs board ────────────────────────────────────────────────────
# Every durable run with its state (Ongoing / Awaiting approval / Completed /
# Failed / Cancelled / Pending), newest first. Sourced from EAIV6031
# (epn.agent.run.list), refreshed on page open and after approve/deny. This is
# the persistent job history the single "latest run" header never showed.
- name-code: EAIC6042
  name: Workflows Header
  component:
    name-code: EIC1020
    text: Workflows & jobs · tap a run to dismiss
    variant: caption01
    color: on-surface-subtle

# on-item-tap dismisses the tapped run (EALC6023 → epn.agent.run.dismiss with the
# row's id). This lets the user clear a stuck pending/running "ghost" run that was
# interrupted and never resumes — the reconcile requeue leaves such runs on the
# board, and "Clear finished" only removes terminal ones.
- name-code: EAIC6041
  name: Workflows List
  component:
    name-code: EIC1026
    source: EAIV6031
    item-type: list-item
    title-field: title
    subtitle-field: subtitle
    on-item-tap: EALC6023
    scrollable: true
    max-height: 160

- name-code: EAIC6043
  name: Clear Finished Button
  component:
    name-code: EIC1008
    label: Clear finished
    on-click: EALC6022

