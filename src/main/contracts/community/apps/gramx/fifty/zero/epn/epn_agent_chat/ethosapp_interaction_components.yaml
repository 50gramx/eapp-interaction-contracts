# ── Header ────────────────────────────────────────────────────────────────────

- name-code: EAIC6001
  name: Evo Header
  component:
    name-code: EIC1004
    label: Evo — EP&N Concierge

# ── Message list ──────────────────────────────────────────────────────────────

# Reactive list — updated on every send. Each item: {role, text}.
# role field (You / Evo / error) shows as subtitle badge.
- name-code: EAIC6002
  name: Messages List
  component:
    name-code: EIC1026
    source: EAIV6002
    item-type: chat-message
    text-field: text
    sender-field: role
    self-sender-values:
      - You
    error-sender-values:
      - error
    show-sender-label: true
    show-avatar: true
    scrollable: true
    max-height: 440

# Empty state — shown when EAIV6002 is empty.
- name-code: EAIC6003
  name: Empty State Label
  component:
    name-code: EIC1020
    text: Ask Evo anything about your node — deployments, status, costs.
    variant: body01
    align: center
    color: on-surface-subtle

# ── Composer ──────────────────────────────────────────────────────────────────

- name-code: EAIC6004
  name: Input Field
  component:
    name-code: EIC1009
    hint-text: Ask Evo anything…
    text-controller: EALC6001
    on-change: EALC6004

- name-code: EAIC6005
  name: Send Button
  component:
    name-code: EIC1006
    label: Send
    on-click: EALC6002

# ── Divider ───────────────────────────────────────────────────────────────────

- name-code: EAIC6006
  name: Divider
  component:
    name-code: EIC1025
    height: 1

# ── Action row: Send + Clear ──────────────────────────────────────────────────

- name-code: EAIC6007
  name: Action Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC6005
      - EAIC6008

# ── Clear button ──────────────────────────────────────────────────────────────

- name-code: EAIC6008
  name: Clear Button
  component:
    name-code: EIC1008
    label: Clear
    on-click: EALC6003

# ── Persona picker ────────────────────────────────────────────────────────────

- name-code: EAIC6011
  name: Evo Button
  component:
    name-code: EIC1008
    label: "Evo ✦"
    on-click: EALC6005

- name-code: EAIC6012
  name: Sigma Button
  component:
    name-code: EIC1008
    label: "Sigma ⚙"
    on-click: EALC6006

- name-code: EAIC6013
  name: Lume Button
  component:
    name-code: EIC1008
    label: "Lume ◎"
    on-click: EALC6007

- name-code: EAIC6014
  name: Persona Picker Row
  component:
    name-code: EIC1012
    children-components:
      - EAIC6011
      - EAIC6012
      - EAIC6013

# ── Layout columns ────────────────────────────────────────────────────────────

- name-code: EAIC6009
  name: Chat History Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC6001
      - EAIC6020
      - EAIC6021
      - EAIC6014
      - EAIC6003
      - EAIC6002

# Input field (full width in column) + action buttons below it.
- name-code: EAIC6010
  name: Composer Section
  component:
    name-code: EIC1005
    children-components:
      - EAIC6006
      - EAIC6004
      - EAIC6007

# ── Design framing: LEVEL chip + local-first cue ──────────────────────────────
- name-code: EAIC6020
  name: Language Chip
  component:
    name-code: EIC1030
    label: LEVEL · personal
    status: neutral

- name-code: EAIC6021
  name: Local First Cue
  component:
    name-code: EIC1020
    text: Evo answers locally first. It tells you when it would escalate to a cloud model.
    variant: caption01
    color: on-surface-subtle

# ── Carbon Tile wrappers ────────────────────────────────────────────────────
# Matches Home/Node/Peers/Circle: history and composer each sit in an EIC1023
# tile (layer-02). Note: this wraps the page chrome only — the chat bubble
# itself (EIC1026 item-type: chat-message) has no Carbon implementation yet
# per docs/CARBON_JITTERY_CONFORMANCE_MAP.md ("Level-only"); that's a
# composer-code gap in eapp-jittery-modelled, not fixable from the contract.

- name-code: EAIC6030
  name: Chat History Tile
  component:
    name-code: EIC1023
    child: EAIC6009
    color: layer-02

- name-code: EAIC6031
  name: Composer Tile
  component:
    name-code: EIC1023
    child: EAIC6010
    color: layer-02
