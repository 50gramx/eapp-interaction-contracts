# Reusing the EIC1026 list (not EIC1032 table) deliberately: EIC1032 has no
# on-row-tap (documented in EPN_DESIGN_BACKLOG.md — epn_market's offers list
# has the same constraint and made the same choice for the same reason).
# subtitle-field uses subtitle_display (did_short + role folded into one
# string, precomputed server-side) since EIC1026 has no separate
# badge/status column the way EIC1032 does.
- name-code: EAIC15032
  name: Roster List
  component:
    name-code: EIC1026
    source: EAIV15011
    item-type: list-item
    title-field: label
    subtitle-field: subtitle_display
    trailing-text-field: online_display
    on-item-tap: EALC15007

- name-code: EAIC15034
  name: Selected Label
  component:
    name-code: EIC1020
    text: EAIV15009
    variant: code01

- name-code: EAIC15035
  name: Remove Selected Button
  component:
    name-code: EIC1008
    label: Remove this device
    on-click: EALC15008

- name-code: EAIC15036
  name: Selected Column
  component:
    name-code: EIC1005
    children-components:
      - EAIC15034
      - EAIC15035

- name-code: EAIC15038
  name: No Selection Note
  component:
    name-code: EIC1020
    text: Tap a device above to remove it.
    variant: caption01
    color: on-surface-subtle

# Matches on an explicit "selected"/"none" enum (EAIV15015), not the raw
# selected DID (EAIV15008) — EIC1036 needs fixed case values, the same
# reasoning epn_node's "Selection Match" (EAIC14118) already uses.
- name-code: EAIC15037
  name: Selection Match
  component:
    name-code: EIC1036
    source: EAIV15015
    cases:
      selected: EAIC15036
      none: EAIC15038
    default: EAIC15038

