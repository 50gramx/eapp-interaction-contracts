# ── Reciprocity-gap banner (SA-RING-RECIPROCITY-GAP) — always evaluated,
# independent of wizard state, shown above whichever state tile is active ──

- name-code: EAIC15059
  name: Notice Chip
  component:
    name-code: EIC1030
    label: New
    status: primary

- name-code: EAIC15050
  name: Notice Header
  component:
    name-code: EIC1004
    label: New in your circle

- name-code: EAIC15051
  name: Notice From
  component:
    name-code: EIC1020
    text: EAIV15018.from_did_short
    variant: code01

- name-code: EAIC15052
  name: Notice Body
  component:
    name-code: EIC1020
    text: added you to their circle. Add their code back so you can use each other's devices too.
    variant: caption01
    color: on-surface-subtle

- name-code: EAIC15053
  name: Dismiss Notice Button
  component:
    name-code: EIC1008
    label: Dismiss
    on-click: EALC15015

- name-code: EAIC15054
  name: Notice Column
  component:
    name-code: EIC1005
    children-components:
      - EAIC15059
      - EAIC15050
      - EAIC15051
      - EAIC15052
      - EAIC15053

- name-code: EAIC15055
  name: Notice Card
  component:
    name-code: EIC1023
    child: EAIC15054

# A zero-height divider as the "nothing to show" placeholder — EIC1001
# (Spacer) has no proven usage anywhere in this app family to confirm its
# prop name, whereas EIC1025 (Divider)'s height prop is used throughout
# (epn_peers, epn_node, etc.), so this is the lower-risk choice.
- name-code: EAIC15057
  name: Notice Empty Placeholder
  component:
    name-code: EIC1025
    height: 0

# Matches on an explicit "show"/"hide" enum (EAIV15019), not on the notice
# map itself — same EIC1036-needs-fixed-cases reasoning as Selection Match.
- name-code: EAIC15058
  name: Notice Match
  component:
    name-code: EIC1036
    source: EAIV15019
    cases:
      show: EAIC15055
      hide: EAIC15057
    default: EAIC15057

