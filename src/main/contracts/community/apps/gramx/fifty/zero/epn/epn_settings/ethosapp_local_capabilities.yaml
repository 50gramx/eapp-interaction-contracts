# Load spend policy, KYC, energy policy, and initialize AI key controllers on page appear.
- name-code: EALC12001
  name: Init Page
  context:
    steps:
      - command: platform-invoke
        handler: epn.settings.spend.get
        assign-to: EAIV12001
      - command: platform-invoke
        handler: epn.identity.kyc
        assign-to: EAIV12006
      - command: platform-invoke
        handler: epn.settings.energy.get
        assign-to: EAIV12007
      - command: local-capability
        capability: EALC12010
        assign-to: EAIV12011
      - command: local-capability
        capability: EALC12011
        assign-to: EAIV12012
      - command: platform-invoke
        handler: epn.identity.keys_status
        assign-to: EAIV12013
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV12019

# Return the max-per-hour TextEditingController.
- name-code: EALC12002
  name: Get Max Per Hour Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12002

# Return the max-per-peer TextEditingController.
- name-code: EALC12003
  name: Get Max Per Peer Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12003

# Return the confirm-above TextEditingController.
- name-code: EALC12004
  name: Get Confirm Above Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12004

# Save spend policy from the three input controllers.
- name-code: EALC12005
  name: Save Spend Policy
  context:
    steps:
      - command: platform-invoke
        handler: epn.settings.spend.set
        params:
          max_per_hour_uetc: EAIV12002
          max_per_peer_uetc: EAIV12003
          confirm_above_uetc: EAIV12004
        assign-to: EAIV12001
      - command: platform-invoke
        handler: epn.settings.spend.get
        assign-to: EAIV12001

# Return the energy-policy TextEditingController.
- name-code: EALC12007
  name: Get Energy Policy Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12008

# Return the energy-geo TextEditingController.
- name-code: EALC12008
  name: Get Energy Geo Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12009

# Save energy policy + geo from the input controllers.
- name-code: EALC12009
  name: Save Energy Policy
  context:
    steps:
      - command: platform-invoke
        handler: epn.settings.energy.set
        params:
          policy: EAIV12008
          geo: EAIV12009
        assign-to: EAIV12007

# Initiate KYC email self-attestation.
- name-code: EALC12006
  name: Attest Email
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.initiate_kyc
        assign-to: EAIV12005
      - command: platform-invoke
        handler: epn.identity.kyc
        assign-to: EAIV12006

# ── AI keys (device-level, local-only) ────────────────────────────────────────
# Return the Anthropic key TextEditingController.
- name-code: EALC12010
  name: Get Anthropic Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12011

# Return the OpenAI key TextEditingController.
- name-code: EALC12011
  name: Get OpenAI Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12012

# Save the Anthropic key device-level (~/.epn/anthropic.key), then refresh status.
- name-code: EALC12012
  name: Save Anthropic Key
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.set_key
        params:
          provider: anthropic
          key: EAIV12011
        assign-to: EAIV12014
      - command: platform-invoke
        handler: epn.identity.keys_status
        assign-to: EAIV12013

# Save the OpenAI key device-level (~/.epn/openai.key), then refresh status.
- name-code: EALC12013
  name: Save OpenAI Key
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.set_key
        params:
          provider: openai
          key: EAIV12012
        assign-to: EAIV12014
      - command: platform-invoke
        handler: epn.identity.keys_status
        assign-to: EAIV12013

# ── Node resources (device-aware sizing override) ─────────────────────────────
- name-code: EALC12014
  name: Get CPUs Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12015

- name-code: EALC12015
  name: Get Memory Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12016

- name-code: EALC12016
  name: Get Disk Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12017

- name-code: EALC12017
  name: Save Node Resources
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.set_resources
        params:
          cpus: EAIV12015
          memory: EAIV12016
          disk: EAIV12017
        assign-to: EAIV12018

# ── Nodes & device management ─────────────────────────────────────────────────
- name-code: EALC12018
  name: Load Nodes
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV12019

- name-code: EALC12019
  name: Get Remove Node Id Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12020

- name-code: EALC12020
  name: Remove Node
  context:
    steps:
      - command: platform-invoke
        handler: epn.node.remove
        params:
          node_id: EAIV12020
        assign-to: EAIV12021
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV12019

- name-code: EALC12021
  name: Clean Device
  context:
    steps:
      - command: platform-invoke
        handler: epn.device.clean
        assign-to: EAIV12021
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV12019
