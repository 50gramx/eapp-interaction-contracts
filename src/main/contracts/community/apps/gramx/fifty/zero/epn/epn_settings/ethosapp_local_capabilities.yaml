# Load spend policy, KYC, energy policy, and initialize AI key controllers on page appear.
- name-code: EALC12001
  name: Init Page
  context:
    steps:
      - command: platform-invoke
        handler: epn.settings.spend.get
        assign-to: EAIV12001
      - command: platform-invoke
        handler: epn.identity.kyc
        assign-to: EAIV12006
      # Derived KYC flags inserted here, not appended at the end of this
      # capability: `command: local-capability` below isn't a registered
      # command (confirmed against eapp-flow-bob's command registry) -- it
      # returns "Unknown command" and aborts the whole chain, so every step
      # after it never runs today. Placing this before that point means it
      # isn't starved by a pre-existing, unrelated bug left as-is here.
      - command: get-map-value
        target-map: EAIV12006
        key: kyc_level
        assign-to: EAIV12027
      - command: if
        condition:
          - EAIV12027
          - greater-than
          - 0
        then:
          - command: set
            target: EAIV12026
            value: "verified"
        else:
          - command: set
            target: EAIV12026
            value: "none"
      - command: get-map-value
        target-map: EAIV12006
        key: expiring_soon
        assign-to: EAIV12029
      - command: platform-invoke
        handler: epn.settings.energy.get
        assign-to: EAIV12007
      - command: local-capability
        capability: EALC12010
        assign-to: EAIV12011
      - command: local-capability
        capability: EALC12011
        assign-to: EAIV12012
      - command: platform-invoke
        handler: epn.identity.keys_status
        assign-to: EAIV12013
      - command: platform-invoke
        handler: epn.node.list
        assign-to: EAIV12019

# Return the max-per-hour TextEditingController.
- name-code: EALC12002
  name: Get Max Per Hour Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12002

# Return the max-per-peer TextEditingController.
- name-code: EALC12003
  name: Get Max Per Peer Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12003

# Return the confirm-above TextEditingController.
- name-code: EALC12004
  name: Get Confirm Above Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12004

# Save spend policy from the three input controllers.
- name-code: EALC12005
  name: Save Spend Policy
  context:
    steps:
      - command: platform-invoke
        handler: epn.settings.spend.set
        params:
          max_per_hour_uetc: EAIV12002
          max_per_peer_uetc: EAIV12003
          confirm_above_uetc: EAIV12004
        assign-to: EAIV12001
      - command: platform-invoke
        handler: epn.settings.spend.get
        assign-to: EAIV12001

# Return the energy-policy TextEditingController.
- name-code: EALC12007
  name: Get Energy Policy Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12008

# Return the energy-geo TextEditingController.
- name-code: EALC12008
  name: Get Energy Geo Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12009

# Save energy policy + geo from the input controllers.
- name-code: EALC12009
  name: Save Energy Policy
  context:
    steps:
      - command: platform-invoke
        handler: epn.settings.energy.set
        params:
          policy: EAIV12008
          geo: EAIV12009
        assign-to: EAIV12007

# EALC12006 (old self-attest "Attest Email") removed — replaced entirely by
# the real flow below (EALC12022+), never just patched in place.

# ── AI keys (device-level, local-only) ────────────────────────────────────────
# Return the Anthropic key TextEditingController.
- name-code: EALC12010
  name: Get Anthropic Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12011

# Return the OpenAI key TextEditingController.
- name-code: EALC12011
  name: Get OpenAI Controller
  context:
    returns:
      type: ELVT1001
    steps:
      - command: return
        value: EAIV12012

# Save the Anthropic key device-level (~/.epn/anthropic.key), then refresh status.
- name-code: EALC12012
  name: Save Anthropic Key
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.set_key
        params:
          provider: anthropic
          key: EAIV12011
        assign-to: EAIV12014
      - command: platform-invoke
        handler: epn.identity.keys_status
        assign-to: EAIV12013

# Save the OpenAI key device-level (~/.epn/openai.key), then refresh status.
- name-code: EALC12013
  name: Save OpenAI Key
  context:
    steps:
      - command: platform-invoke
        handler: epn.identity.set_key
        params:
          provider: openai
          key: EAIV12012
        assign-to: EAIV12014
      - command: platform-invoke
        handler: epn.identity.keys_status
        assign-to: EAIV12013

